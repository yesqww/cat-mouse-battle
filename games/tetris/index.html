<!DOCTYPE html>
<html>
<head>
  <title>俄罗斯方块 - Tetris</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body { 
      font-family: Helvetica, sans-serif; 
      background: #1a1a2e; 
      color: #fff; 
      text-align: center;
      margin: 0;
      padding: 10px;
      overflow: hidden;
      touch-action: none;
    }
    
    #tetris { 
      margin: 0 auto; 
      padding: 10px; 
      border: 4px solid #333; 
      border-radius: 10px; 
      background-color: #16213e; 
      display: inline-block;
      max-width: 100%;
    }
    
    #game-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
    }
    
    #canvas { 
      background: #0f3460;
      box-shadow: 10px 10px 10px rgba(0,0,0,0.5); 
      border: 2px solid #333; 
      max-width: 100%;
      height: auto;
    }
    
    #side-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    #menu { 
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 10px;
      min-width: 100px;
    }
    
    #menu p { 
      margin: 0.5em 0; 
      text-align: center; 
      font-size: 0.9em;
    }
    
    #menu p a { 
      text-decoration: none; 
      color: #4ecdc4; 
      font-weight: bold;
      font-size: 1.1em;
    }
    
    #upcoming { 
      display: block; 
      margin: 0 auto; 
      background-color: #0f3460;
      border: 2px solid #333;
      width: 80px;
      height: 80px;
    }
    
    #score { color: #feca57; font-weight: bold; font-size: 1.2em; }
    #rows { color: #ff6b6b; font-weight: bold; font-size: 1.2em; }
    
    /* 触屏控制按钮 */
    #touch-controls {
      display: none;
      margin-top: 15px;
      width: 100%;
      max-width: 300px;
    }
    
    .control-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    
    .control-btn {
      width: 70px;
      height: 70px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(145deg, #4ecdc4, #44a3aa);
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: all 0.1s;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .control-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    
    .control-btn.rotate {
      background: linear-gradient(145deg, #feca57, #e5b548);
      width: 80px;
      height: 80px;
    }
    
    .control-btn.down {
      background: linear-gradient(145deg, #ff6b6b, #ee5a6f);
    }
    
    /* 手机显示控制按钮 */
    @media (max-width: 768px) {
      body {
        padding: 5px;
      }
      
      #tetris {
        padding: 8px;
        width: 100%;
        max-width: 400px;
      }
      
      #game-area {
        flex-direction: column;
        align-items: center;
      }
      
      #side-panel {
        flex-direction: row;
        width: 100%;
        justify-content: space-around;
      }
      
      #menu {
        min-width: auto;
        flex: 1;
      }
      
      #upcoming {
        width: 60px;
        height: 60px;
      }
      
      #touch-controls {
        display: block;
      }
      
      .control-btn {
        width: 60px;
        height: 60px;
        font-size: 20px;
      }
      
      .control-btn.rotate {
        width: 70px;
        height: 70px;
      }
    }
    
    /* 小屏幕适配 */
    @media (max-width: 400px) {
      #menu p {
        font-size: 0.8em;
        margin: 0.3em 0;
      }
      
      #score, #rows {
        font-size: 1em;
      }
      
      .control-btn {
        width: 55px;
        height: 55px;
        font-size: 18px;
      }
      
      .control-btn.rotate {
        width: 65px;
        height: 65px;
      }
    }
    
    /* 桌面端尺寸 */
    @media screen and (min-width: 769px) { 
      #tetris { font-size: 1.00em; } 
      #canvas { width: 300px; height: 600px; } 
    }
  </style>
</head>

<body>

  <div id="tetris">
    <div id="game-area">
      <div id="side-panel">
        <div id="menu">
          <p id="start"><a href="javascript:play();">按空格或点开始</a></p>
          <p>下一个</p>
          <p><canvas id="upcoming" width="80" height="80"></canvas></p>
          <p>得分<br><span id="score">00000</span></p>
          <p>行数<br><span id="rows">0</span></p>
        </div>
      </div>
      
      <canvas id="canvas" width="300" height="600">
        您的浏览器不支持 Canvas，请使用现代浏览器
      </canvas>
    </div>
    
    <!-- 触屏控制按钮 -->
    <div id="touch-controls">
      <div class="control-row">
        <button class="control-btn rotate" id="btn-rotate" title="旋转">↻</button>
      </div>
      <div class="control-row">
        <button class="control-btn" id="btn-left" title="左移">←</button>
        <button class="control-btn down" id="btn-down" title="加速下落">↓</button>
        <button class="control-btn" id="btn-right" title="右移">→</button>
      </div>
    </div>
    
    <p style="font-size: 0.8em; color: #888; margin-top: 10px;">
      电脑：方向键移动，上键旋转，空格开始 | 手机：点击下方按钮
    </p>
  </div>

  <script>
    //=============================================================================
    // Javascript Tetris - Mobile Version
    // Copyright (c) 2011 Jake Gordon
    // Licensed under MIT License
    // https://github.com/jakesgordon/javascript-tetris
    // 
    // Modified for mobile touch support
    //=============================================================================

    function get(id) { return document.getElementById(id); }
    function hide(id) { get(id).style.visibility = 'hidden'; }
    function show(id) { get(id).style.visibility = null; }
    function html(id, html) { get(id).innerHTML = html; }

    function timestamp() { return new Date().getTime(); }
    function random(min, max) { return (min + (Math.random() * (max - min))); }
    function randomChoice(choices) { return choices[Math.round(random(0, choices.length-1))]; }

    if (!window.requestAnimationFrame) {
      window.requestAnimationFrame = window.webkitRequestAnimationFrame ||
                                     window.mozRequestAnimationFrame ||
                                     window.oRequestAnimationFrame ||
                                     window.msRequestAnimationFrame ||
                                     function(callback) { window.setTimeout(callback, 1000 / 60); }
    }

    var KEY = { ESC: 27, SPACE: 32, LEFT: 37, UP: 38, RIGHT: 39, DOWN: 40 },
        DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3, MIN: 0, MAX: 3 },
        canvas = get('canvas'),
        ctx = canvas.getContext('2d'),
        ucanvas = get('upcoming'),
        uctx = ucanvas.getContext('2d'),
        speed = { start: 0.6, decrement: 0.005, min: 0.1 },
        nx = 10, ny = 20, nu = 5;

    var dx, dy, blocks, actions, playing, dt, current, next, score, vscore, rows, step;

    var i = { size: 4, blocks: [0x0F00, 0x2222, 0x00F0, 0x4444], color: 'cyan' };
    var j = { size: 3, blocks: [0x44C0, 0x8E00, 0x6440, 0x0E20], color: 'blue' };
    var l = { size: 3, blocks: [0x4460, 0x0E80, 0xC440, 0x2E00], color: 'orange' };
    var o = { size: 2, blocks: [0xCC00, 0xCC00, 0xCC00, 0xCC00], color: 'yellow' };
    var s = { size: 3, blocks: [0x06C0, 0x8C40, 0x6C00, 0x4620], color: 'green' };
    var t = { size: 3, blocks: [0x0E40, 0x4C40, 0x4E00, 0x4640], color: 'purple' };
    var z = { size: 3, blocks: [0x0C60, 0x4C80, 0xC600, 0x2640], color: 'red' };

    function eachblock(type, x, y, dir, fn) {
      var bit, row = 0, col = 0, blocks = type.blocks[dir];
      for(bit = 0x8000; bit > 0; bit = bit >> 1) {
        if (blocks & bit) fn(x + col, y + row);
        if (++col === 4) { col = 0; ++row; }
      }
    }

    function occupied(type, x, y, dir) {
      var result = false;
      eachblock(type, x, y, dir, function(x, y) {
        if ((x < 0) || (x >= nx) || (y < 0) || (y >= ny) || getBlock(x,y)) result = true;
      });
      return result;
    }

    function unoccupied(type, x, y, dir) { return !occupied(type, x, y, dir); }

    var pieces = [];
    function randomPiece() {
      if (pieces.length == 0) pieces = [i,i,i,i,j,j,j,j,l,l,l,l,o,o,o,o,s,s,s,s,t,t,t,t,z,z,z,z];
      var type = pieces.splice(random(0, pieces.length-1), 1)[0];
      return { type: type, dir: DIR.UP, x: Math.round(random(0, nx - type.size)), y: 0 };
    }

    function run() {
      addEvents();
      addTouchEvents();
      var last = now = timestamp();
      function frame() {
        now = timestamp();
        update(Math.min(1, (now - last) / 1000.0));
        draw();
        last = now;
        requestAnimationFrame(frame);
      }
      resize();
      reset();
      frame();
    }

    function addEvents() {
      document.addEventListener('keydown', keydown, false);
      window.addEventListener('resize', resize, false);
    }

    // 添加触屏事件
    function addTouchEvents() {
      // 防止双击缩放
      document.addEventListener('touchstart', function(e) {
        if (e.target.tagName === 'BUTTON') {
          e.preventDefault();
        }
      }, { passive: false });
      
      // 防止页面滚动
      document.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });
      
      // 按钮控制
      get('btn-left').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.LEFT);
      });
      
      get('btn-left').addEventListener('click', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.LEFT);
      });
      
      get('btn-right').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.RIGHT);
      });
      
      get('btn-right').addEventListener('click', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.RIGHT);
      });
      
      get('btn-rotate').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.UP);
        else play();
      });
      
      get('btn-rotate').addEventListener('click', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.UP);
        else play();
      });
      
      get('btn-down').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.DOWN);
      });
      
      get('btn-down').addEventListener('click', function(e) {
        e.preventDefault();
        if (playing) actions.push(DIR.DOWN);
      });
      
      // 滑动手势支持
      var touchStartX = 0;
      var touchStartY = 0;
      var touchStartTime = 0;
      
      canvas.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = timestamp();
      }, { passive: true });
      
      canvas.addEventListener('touchend', function(e) {
        if (!playing) {
          play();
          return;
        }
        
        var touchEndX = e.changedTouches[0].clientX;
        var touchEndY = e.changedTouches[0].clientY;
        var touchEndTime = timestamp();
        
        var dx = touchEndX - touchStartX;
        var dy = touchEndY - touchStartY;
        var dt = touchEndTime - touchStartTime;
        
        // 快速点击 = 旋转
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 200) {
          actions.push(DIR.UP);
          return;
        }
        
        // 水平滑动
        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > 30) actions.push(DIR.RIGHT);
          else if (dx < -30) actions.push(DIR.LEFT);
        }
        // 垂直滑动
        else {
          if (dy > 30) actions.push(DIR.DOWN);
        }
      }, { passive: true });
    }

    function resize() {
      // 根据屏幕大小调整 canvas
      var maxWidth = window.innerWidth - 40;
      var maxHeight = window.innerHeight - 300;
      
      if (window.innerWidth < 768) {
        // 手机端：自适应宽度
        var size = Math.min(maxWidth, 300);
        canvas.style.width = size + 'px';
        canvas.style.height = (size * 2) + 'px';
      }
      
      canvas.width = 300;
      canvas.height = 600;
      ucanvas.width = 80;
      ucanvas.height = 80;
      
      dx = canvas.width / nx;
      dy = canvas.height / ny;
      invalidate();
      invalidateNext();
    }

    function keydown(ev) {
      var handled = false;
      if (playing) {
        switch(ev.keyCode) {
          case KEY.LEFT: actions.push(DIR.LEFT); handled = true; break;
          case KEY.RIGHT: actions.push(DIR.RIGHT); handled = true; break;
          case KEY.UP: actions.push(DIR.UP); handled = true; break;
          case KEY.DOWN: actions.push(DIR.DOWN); handled = true; break;
          case KEY.ESC: lose(); handled = true; break;
        }
      } else if (ev.keyCode == KEY.SPACE) {
        play();
        handled = true;
      }
      if (handled) ev.preventDefault();
    }

    function play() { hide('start'); reset(); playing = true; }
    function lose() { show('start'); setVisualScore(); playing = false; }

    function setVisualScore(n) { vscore = n || score; invalidateScore(); }
    function setScore(n) { score = n; setVisualScore(n); }
    function addScore(n) { score = score + n; }
    function clearScore() { setScore(0); }
    function clearRows() { setRows(0); }
    function setRows(n) { rows = n; step = Math.max(speed.min, speed.start - (speed.decrement*rows)); invalidateRows(); }
    function addRows(n) { setRows(rows + n); }
    function getBlock(x,y) { return (blocks && blocks[x] ? blocks[x][y] : null); }
    function setBlock(x,y,type) { blocks[x] = blocks[x] || []; blocks[x][y] = type; invalidate(); }
    function clearBlocks() { blocks = []; invalidate(); }
    function clearActions() { actions = []; }
    function setCurrentPiece(piece) { current = piece || randomPiece(); invalidate(); }
    function setNextPiece(piece) { next = piece || randomPiece(); invalidateNext(); }

    function reset() {
      dt = 0;
      clearActions();
      clearBlocks();
      clearRows();
      clearScore();
      setCurrentPiece(next);
      setNextPiece();
    }

    function update(idt) {
      if (playing) {
        if (vscore < score) setVisualScore(vscore + 1);
        handle(actions.shift());
        dt = dt + idt;
        if (dt > step) { dt = dt - step; drop(); }
      }
    }

    function handle(action) {
      switch(action) {
        case DIR.LEFT: move(DIR.LEFT); break;
        case DIR.RIGHT: move(DIR.RIGHT); break;
        case DIR.UP: rotate(); break;
        case DIR.DOWN: drop(); break;
      }
    }

    function move(dir) {
      var x = current.x, y = current.y;
      switch(dir) {
        case DIR.RIGHT: x++; break;
        case DIR.LEFT: x--; break;
        case DIR.DOWN: y++; break;
      }
      if (unoccupied(current.type, x, y, current.dir)) {
        current.x = x; current.y = y; invalidate(); return true;
      }
      return false;
    }

    function rotate() {
      var newdir = (current.dir == DIR.MAX ? DIR.MIN : current.dir + 1);
      if (unoccupied(current.type, current.x, current.y, newdir)) {
        current.dir = newdir; invalidate();
      }
    }

    function drop() {
      if (!move(DIR.DOWN)) {
        addScore(10);
        dropPiece();
        removeLines();
        setCurrentPiece(next);
        setNextPiece(randomPiece());
        clearActions();
        if (occupied(current.type, current.x, current.y, current.dir)) lose();
      }
    }

    function dropPiece() {
      eachblock(current.type, current.x, current.y, current.dir, function(x, y) {
        setBlock(x, y, current.type);
      });
    }

    function removeLines() {
      var x, y, complete, n = 0;
      for(y = ny; y > 0; --y) {
        complete = true;
        for(x = 0; x < nx; ++x) if (!getBlock(x, y)) complete = false;
        if (complete) { removeLine(y); y++; n++; }
      }
      if (n > 0) { addRows(n); addScore(100*Math.pow(2,n-1)); }
    }

    function removeLine(n) {
      var x, y;
      for(y = n; y >= 0; --y) {
        for(x = 0; x < nx; ++x) setBlock(x, y, (y == 0) ? null : getBlock(x, y-1));
      }
    }

    var invalid = {};
    function invalidate() { invalid.court = true; }
    function invalidateNext() { invalid.next = true; }
    function invalidateScore() { invalid.score = true; }
    function invalidateRows() { invalid.rows = true; }

    function draw() {
      ctx.save();
      ctx.lineWidth = 1;
      ctx.translate(0.5, 0.5);
      drawCourt();
      drawNext();
      drawScore();
      drawRows();
      ctx.restore();
    }

    function drawCourt() {
      if (invalid.court) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (playing) drawPiece(ctx, current.type, current.x, current.y, current.dir);
        var x, y, block;
        for(y = 0; y < ny; y++) {
          for (x = 0; x < nx; x++) {
            if (block = getBlock(x,y)) drawBlock(ctx, x, y, block.color);
          }
        }
        ctx.strokeRect(0, 0, nx*dx - 1, ny*dy - 1);
        invalid.court = false;
      }
    }

    function drawNext() {
      if (invalid.next) {
        var padding = (nu - next.type.size) / 2;
        uctx.save();
        uctx.translate(0.5, 0.5);
        uctx.clearRect(0, 0, nu*dx, nu*dy);
        drawPiece(uctx, next.type, padding, padding, next.dir);
        uctx.strokeStyle = 'black';
        uctx.strokeRect(0, 0, nu*dx - 1, nu*dy - 1);
        uctx.restore();
        invalid.next = false;
      }
    }

    function drawScore() { if (invalid.score) { html('score', ("00000" + Math.floor(vscore)).slice(-5)); invalid.score = false; } }
    function drawRows() { if (invalid.rows) { html('rows', rows); invalid.rows = false; } }

    function drawPiece(ctx, type, x, y, dir) {
      eachblock(type, x, y, dir, function(x, y) { drawBlock(ctx, x, y, type.color); });
    }

    function drawBlock(ctx, x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x*dx, y*dy, dx, dy);
      ctx.strokeRect(x*dx, y*dy, dx, dy);
    }

    run();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陷阱对决 - 双人跑酷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        h1 {
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            font-size: 2.5em;
            letter-spacing: 2px;
        }
        
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: #0a0a0a;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .trap-indicator {
            color: #ff4444;
        }
        
        .health-indicator {
            color: #44ff44;
        }
        
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .control-group {
            text-align: center;
        }
        
        .control-group h3 {
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            margin: 2px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.3);
            font-family: monospace;
            font-weight: bold;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        
        #gameOver h2 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ffd700;
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .winner-escape {
            color: #44ff44 !important;
        }
        
        .winner-saboteur {
            color: #ff4444 !important;
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        #startScreen h2 {
            font-size: 2em;
            margin-bottom: 30px;
            color: #ffd700;
        }
        
        .role-desc {
            display: flex;
            gap: 50px;
            margin-bottom: 30px;
        }
        
        .role {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            border: 2px solid;
        }
        
        .role.escape {
            border-color: #44ff44;
        }
        
        .role.saboteur {
            border-color: #ff4444;
        }
        
        .role h3 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>🏃 陷阱对决 🕸️</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <div id="ui">
            <div class="trap-indicator">陷阱剩余: <span id="trapCount">10</span></div>
            <div class="health-indicator">逃跑者生命: <span id="health">❤️❤️❤️</span></div>
        </div>
        
        <div id="startScreen">
            <h2>选择你的阵营</h2>
            <div class="role-desc">
                <div class="role escape">
                    <h3>🏃 逃跑者 (WASD)</h3>
                    <p>从左侧起点到达右侧终点</p>
                    <p>避开所有移动陷阱</p>
                    <p>中陷阱即重生，3次机会</p>
                </div>
                <div class="role saboteur">
                    <h3>🕸️ 破坏者 (方向键)</h3>
                    <p>使用方向键激活陷阱</p>
                    <p>陷阱会向对应方向移动</p>
                    <p>阻止逃跑者到达终点</p>
                    <p>只有10个陷阱可用！</p>
                </div>
            </div>
            <button onclick="startGame()">开始游戏</button>
        </div>
        
        <div id="gameOver">
            <h2 id="winnerText"></h2>
            <p id="winnerDesc"></p>
            <button onclick="resetGame()">再来一局</button>
        </div>
    </div>
    
    <div id="controls">
        <div class="control-group">
            <h3>🏃 逃跑者控制</h3>
            <div><span class="key">W</span> 上</div>
            <div><span class="key">A</span> 左 <span class="key">S</span> 下 <span class="key">D</span> 右</div>
        </div>
        <div class="control-group">
            <h3>🕸️ 破坏者控制</h3>
            <div><span class="key">↑</span> 上</div>
            <div><span class="key">←</span> 左 <span class="key">↓</span> 下 <span class="key">→</span> 右</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = false;
        let animationId;
        
        // 游戏对象
        const game = {
            width: 1000,
            height: 600,
            gridSize: 40,
            trapsLeft: 10,
            lives: 3,
            winner: null
        };
        
        // 逃跑者
        const runner = {
            x: 50,
            y: 300,
            size: 20,
            speed: 5,
            color: '#44ff44',
            keys: { w: false, a: false, s: false, d: false },
            trail: [],
            invincible: 0
        };
        
        // 破坏者控制
        const saboteur = {
            keys: { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false }
        };
        
        // 关卡设计
        let platforms = [];
        let traps = [];
        let particles = [];
        
        // 初始化关卡
        function initLevel() {
            platforms = [];
            traps = [];
            
            // 地面
            platforms.push({ x: 0, y: 550, w: 1000, h: 50, type: 'floor' });
            
            // 起点平台
            platforms.push({ x: 0, y: 400, w: 200, h: 20, type: 'platform' });
            
            // 中间平台群
            platforms.push({ x: 250, y: 450, w: 150, h: 20, type: 'platform' });
            platforms.push({ x: 450, y: 350, w: 100, h: 20, type: 'platform' });
            platforms.push({ x: 600, y: 250, w: 150, h: 20, type: 'platform' });
            platforms.push({ x: 350, y: 200, w: 100, h: 20, type: 'platform' });
            platforms.push({ x: 750, y: 400, w: 150, h: 20, type: 'platform' });
            platforms.push({ x: 800, y: 150, w: 100, h: 20, type: 'platform' });
            
            // 终点平台
            platforms.push({ x: 900, y: 300, w: 100, h: 20, type: 'finish' });
            
            // 初始化陷阱位置（静态，等待激活）
            traps = [
                { x: 300, y: 430, w: 30, h: 20, originalX: 300, originalY: 430, active: false, direction: null, moveTimer: 0 },
                { x: 500, y: 330, w: 30, h: 20, originalX: 500, originalY: 330, active: false, direction: null, moveTimer: 0 },
                { x: 650, y: 230, w: 30, h: 20, originalX: 650, originalY: 230, active: false, direction: null, moveTimer: 0 },
                { x: 400, y: 180, w: 30, h: 20, originalX: 400, originalY: 180, active: false, direction: null, moveTimer: 0 },
                { x: 800, y: 380, w: 30, h: 20, originalX: 800, originalY: 380, active: false, direction: null, moveTimer: 0 },
                { x: 850, y: 130, w: 30, h: 20, originalX: 850, originalY: 130, active: false, direction: null, moveTimer: 0 },
                { x: 550, y: 530, w: 40, h: 20, originalX: 550, originalY: 530, active: false, direction: null, moveTimer: 0 },
                { x: 200, y: 380, w: 30, h: 20, originalX: 200, originalY: 380, active: false, direction: null, moveTimer: 0 },
                { x: 700, y: 480, w: 30, h: 20, originalX: 700, originalY: 480, active: false, direction: null, moveTimer: 0 },
                { x: 150, y: 250, w: 30, h: 20, originalX: 150, originalY: 250, active: false, direction: null, moveTimer: 0 }
            ];
        }
        
        // 粒子效果
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 30;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.5; // 重力
                this.life--;
                this.size *= 0.95;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }
        
        // 输入处理
        document.addEventListener('keydown', (e) => {
            // 逃跑者
            if (e.key === 'w' || e.key === 'W') runner.keys.w = true;
            if (e.key === 'a' || e.key === 'A') runner.keys.a = true;
            if (e.key === 's' || e.key === 'S') runner.keys.s = true;
            if (e.key === 'd' || e.key === 'D') runner.keys.d = true;
            
            // 破坏者 - 方向键控制陷阱
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                activateTrap(e.key);
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') runner.keys.w = false;
            if (e.key === 'a' || e.key === 'A') runner.keys.a = false;
            if (e.key === 's' || e.key === 'S') runner.keys.s = false;
            if (e.key === 'd' || e.key === 'D') runner.keys.d = false;
        });
        
        // 激活陷阱
        function activateTrap(direction) {
            if (game.trapsLeft <= 0 || !gameRunning) return;
            
            // 找到最近的未激活陷阱或重置已完成的陷阱
            let trap = traps.find(t => !t.active);
            if (!trap) {
                // 如果没有未激活的，重置一个已经移动回来的
                trap = traps.find(t => t.moveTimer <= 0 && t.x === t.originalX && t.y === t.originalY);
            }
            
            if (trap) {
                trap.active = true;
                trap.direction = direction;
                trap.moveTimer = 60; // 移动持续时间（帧）
                game.trapsLeft--;
                updateUI();
                
                // 视觉反馈
                createExplosion(trap.x + trap.w/2, trap.y + trap.h/2, '#ff4444', 10);
            }
        }
        
        // 更新游戏逻辑
        function update() {
            if (!gameRunning) return;
            
            // 更新逃跑者
            updateRunner();
            
            // 更新陷阱
            updateTraps();
            
            // 更新粒子
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
            
            // 检查胜利条件
            checkWinCondition();
            
            // 更新无敌时间
            if (runner.invincible > 0) runner.invincible--;
        }
        
        function updateRunner() {
            let dx = 0;
            let dy = 0;
            
            if (runner.keys.w) dy = -runner.speed;
            if (runner.keys.s) dy = runner.speed;
            if (runner.keys.a) dx = -runner.speed;
            if (runner.keys.d) dx = runner.speed;
            
            // 保存旧位置
            const oldX = runner.x;
            const oldY = runner.y;
            
            // 尝试移动
            runner.x += dx;
            runner.y += dy;
            
            // 边界检查
            runner.x = Math.max(runner.size, Math.min(game.width - runner.size, runner.x));
            runner.y = Math.max(runner.size, Math.min(game.height - runner.size, runner.y));
            
            // 平台碰撞检测
            let onPlatform = false;
            
            for (let platform of platforms) {
                if (rectIntersect(
                    runner.x - runner.size, runner.y - runner.size, runner.size * 2, runner.size * 2,
                    platform.x, platform.y, platform.w, platform.h
                )) {
                    // 简单碰撞响应：回退
                    runner.x = oldX;
                    runner.y = oldY;
                }
            }
            
            // 检查是否到达终点
            const finish = platforms.find(p => p.type === 'finish');
            if (finish && rectIntersect(
                runner.x - runner.size, runner.y - runner.size, runner.size * 2, runner.size * 2,
                finish.x, finish.y, finish.w, finish.h
            )) {
                game.winner = 'escape';
                endGame();
            }
            
            // 添加轨迹
            if (dx !== 0 || dy !== 0) {
                runner.trail.push({ x: runner.x, y: runner.y, life: 10 });
            }
            runner.trail = runner.trail.filter(t => --t.life > 0);
            
            // 陷阱碰撞检测
            if (runner.invincible <= 0) {
                for (let trap of traps) {
                    if (trap.active && rectIntersect(
                        runner.x - runner.size, runner.y - runner.size, runner.size * 2, runner.size * 2,
                        trap.x, trap.y, trap.w, trap.h
                    )) {
                        hitRunner();
                        break;
                    }
                }
            }
        }
        
        function updateTraps() {
            for (let trap of traps) {
                if (trap.active && trap.moveTimer > 0) {
                    const speed = 4;
                    
                    switch(trap.direction) {
                        case 'ArrowUp':
                            trap.y -= speed;
                            break;
                        case 'ArrowDown':
                            trap.y += speed;
                            break;
                        case 'ArrowLeft':
                            trap.x -= speed;
                            break;
                        case 'ArrowRight':
                            trap.x += speed;
                            break;
                    }
                    
                    trap.moveTimer--;
                    
                    // 边界检查
                    trap.x = Math.max(0, Math.min(game.width - trap.w, trap.x));
                    trap.y = Math.max(0, Math.min(game.height - trap.h, trap.y));
                } else if (trap.moveTimer <= 0 && (trap.x !== trap.originalX || trap.y !== trap.originalY)) {
                    // 缓慢返回原位
                    trap.x += (trap.originalX - trap.x) * 0.1;
                    trap.y += (trap.originalY - trap.y) * 0.1;
                    
                    if (Math.abs(trap.x - trap.originalX) < 1 && Math.abs(trap.y - trap.originalY) < 1) {
                        trap.x = trap.originalX;
                        trap.y = trap.originalY;
                        trap.active = false;
                    }
                }
            }
        }
        
        function hitRunner() {
            game.lives--;
            updateUI();
            createExplosion(runner.x, runner.y, '#44ff44', 30);
            
            // 重置逃跑者位置
            runner.x = 50;
            runner.y = 300;
            runner.invincible = 120; // 2秒无敌时间
            
            if (game.lives <= 0) {
                game.winner = 'saboteur';
                endGame();
            }
        }
        
        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
        }
        
        function checkWinCondition() {
            if (game.trapsLeft === 0) {
                // 检查所有陷阱是否都回归原位
                const allReturned = traps.every(t => 
                    Math.abs(t.x - t.originalX) < 1 && Math.abs(t.y - t.originalY) < 1
                );
                
                if (allReturned && game.lives > 0) {
                    // 破坏者没陷阱了，逃跑者只要还活着就赢
                    // 但给破坏者一个机会，等待一段时间
                }
            }
        }
        
        // 渲染
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格背景
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i < game.width; i += game.gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, game.height);
                ctx.stroke();
            }
            for (let i = 0; i < game.height; i += game.gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(game.width, i);
                ctx.stroke();
            }
            
            // 绘制起点和终点标记
            drawStartEnd();
            
            // 绘制平台
            for (let platform of platforms) {
                if (platform.type === 'finish') {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffd700';
                } else {
                    ctx.fillStyle = '#444';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
                
                // 平台边框
                ctx.strokeStyle = platform.type === 'finish' ? '#ffed4e' : '#666';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x, platform.y, platform.w, platform.h);
            }
            ctx.shadowBlur = 0;
            
            // 绘制陷阱
            for (let i = 0; i < traps.length; i++) {
                const trap = traps[i];
                
                // 陷阱发光效果
                if (trap.active) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff0000';
                }
                
                // 陷阱主体
                const gradient = ctx.createRadialGradient(
                    trap.x + trap.w/2, trap.y + trap.h/2, 0,
                    trap.x + trap.w/2, trap.y + trap.h/2, trap.w
                );
                gradient.addColorStop(0, '#ff4444');
                gradient.addColorStop(1, '#990000');
                ctx.fillStyle = gradient;
                
                // 绘制尖刺形状
                ctx.beginPath();
                ctx.moveTo(trap.x + trap.w/2, trap.y);
                ctx.lineTo(trap.x + trap.w, trap.y + trap.h);
                ctx.lineTo(trap.x, trap.y + trap.h);
                ctx.closePath();
                ctx.fill();
                
                // 编号
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(i + 1, trap.x + trap.w/2, trap.y + trap.h - 5);
                
                ctx.shadowBlur = 0;
            }
            
            // 绘制粒子
            for (let particle of particles) {
                particle.draw();
            }
            
            // 绘制逃跑者轨迹
            for (let i = 0; i < runner.trail.length; i++) {
                const t = runner.trail[i];
                ctx.fillStyle = `rgba(68, 255, 68, ${t.life / 10})`;
                ctx.beginPath();
                ctx.arc(t.x, t.y, runner.size * (t.life / 10), 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 绘制逃跑者
            if (runner.invincible % 10 < 5) { // 闪烁效果
                ctx.save();
                ctx.translate(runner.x, runner.y);
                
                // 发光效果
                ctx.shadowBlur = 20;
                ctx.shadowColor = runner.color;
                
                // 身体
                ctx.fillStyle = runner.color;
                ctx.beginPath();
                ctx.arc(0, 0, runner.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-6, -4, 3, 0, Math.PI * 2);
                ctx.arc(6, -4, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // 方向指示
                if (runner.keys.d) ctx.rotate(0);
                else if (runner.keys.a) ctx.scale(-1, 1);
                
                ctx.restore();
            }
            
            // 绘制陷阱数量提示（当剩余少时）
            if (game.trapsLeft <= 3 && gameRunning) {
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`陷阱即将耗尽: ${game.trapsLeft}`, game.width/2, 50);
            }
        }
        
        function drawStartEnd() {
            // 起点
            ctx.fillStyle = '#4444ff';
            ctx.fillRect(0, 250, 10, 100);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('起点', 30, 305);
            
            // 终点线效果
            const finish = platforms.find(p => p.type === 'finish');
            if (finish) {
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(finish.x, finish.y - 20);
                ctx.lineTo(finish.x + finish.w, finish.y - 20);
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.fillStyle = '#ffd700';
                ctx.fillText('终点', finish.x + finish.w/2, finish.y - 30);
            }
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // UI更新
        function updateUI() {
            document.getElementById('trapCount').textContent = game.trapsLeft;
            let hearts = '';
            for (let i = 0; i < game.lives; i++) hearts += '❤️';
            document.getElementById('health').textContent = hearts || '💀';
        }
        
        // 游戏控制
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            game.trapsLeft = 10;
            game.lives = 3;
            game.winner = null;
            runner.x = 50;
            runner.y = 300;
            runner.trail = [];
            runner.invincible = 0;
            initLevel();
            updateUI();
        }
        
        function endGame() {
            gameRunning = false;
            const gameOver = document.getElementById('gameOver');
            const winnerText = document.getElementById('winnerText');
            const winnerDesc = document.getElementById('winnerDesc');
            
            gameOver.style.display = 'block';
            
            if (game.winner === 'escape') {
                winnerText.textContent = '🏃 逃跑者胜利！';
                winnerText.className = 'winner-escape';
                winnerDesc.textContent = `剩余生命: ${game.lives} | 剩余陷阱: ${game.trapsLeft}`;
            } else {
                winnerText.textContent = '🕸️ 破坏者胜利！';
                winnerText.className = 'winner-saboteur';
                winnerDesc.textContent = '成功阻止了逃跑者！';
            }
        }
        
        function resetGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        // 启动游戏循环
        gameLoop();
    </script>
</body>
</html>

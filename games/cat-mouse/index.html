<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫鼠大战 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }
        
        .title {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.8);
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
        #gameCanvas {
            border: 3px solid #4ecdc4;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
            background: #e6f5ff;
            cursor: none;
            max-width: 95vw;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 220px;
        }
        
        .control-box h3 {
            margin-bottom: 8px;
            font-size: 1rem;
        }
        
        .cat-control h3 { color: #ff9f43; }
        .mouse-control h3 { color: #a29bfe; }
        
        .control-box p {
            color: #ccc;
            font-size: 0.85rem;
            margin: 4px 0;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid;
            max-width: 500px;
        }
        
        .start-modal .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-color: #4ecdc4;
            box-shadow: 0 0 50px rgba(78, 205, 196, 0.5);
        }
        
        .game-over-modal .modal-content {
            background: linear-gradient(135deg, #2d1b1b, #1a1a2e);
            border-color: #ff6b6b;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
        }
        
        .modal h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .start-modal h2 {
            color: #4ecdc4;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }
        
        .winner-cat { color: #ff9f43; text-shadow: 0 0 20px rgba(255, 159, 67, 0.8); }
        .winner-mouse { color: #a29bfe; text-shadow: 0 0 20px rgba(162, 155, 254, 0.8); }
        
        .btn {
            background: linear-gradient(45deg, #4ecdc4, #44a3aa);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(78, 205, 196, 0.6);
        }
        
        .hidden { display: none !important; }
        
        .final-score {
            font-size: 3rem;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 class="title">🐱 猫鼠大战 - 增强版 🐭</h1>
    <p class="subtitle">双人游戏 | 点击游戏区域激活键盘！</p>
    
    <canvas id="gameCanvas" width="1000" height="700"></canvas>
    
    <div class="controls">
        <div class="control-box cat-control">
            <h3>🐱 小猫（抓）</h3>
            <p>WASD 或方向键移动</p>
            <p>按住 Shift 加速冲刺！(消耗能量)</p>
            <p>抓到老鼠3次获胜！</p>
        </div>
        <div class="control-box mouse-control">
            <h3>🐭 老鼠（逃）</h3>
            <p>鼠标移动控制</p>
            <p>躲进 🏠 绿色安全区获得3秒无敌！</p>
            <p>注意避开棕色障碍物！</p>
            <p>坚持2分钟获胜！</p>
        </div>
    </div>

    <div class="modal start-modal" id="startModal">
        <div class="modal-content">
            <h2>准备好了吗？</h2>
            <p>🐱 玩家1：WASD控制猫咪，Shift加速冲刺</p>
            <p>🐭 玩家2：鼠标控制老鼠逃跑</p>
            <p>🏠 安全区：老鼠进入可获得3秒无敌（有冷却）</p>
            <p>🟫 障碍物：会阻挡双方移动</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <div class="modal game-over-modal hidden" id="gameOverModal">
        <div class="modal-content">
            <h2 id="winnerText">游戏结束</h2>
            <div class="final-score" id="finalScore"></div>
            <p id="gameOverReason"></p>
            <button class="btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CANVAS_WIDTH = 1000;
        const CANVAS_HEIGHT = 700;
        const CAT_SPEED = 4;
        const CAT_BOOST_SPEED = 8;
        const MOUSE_SPEED = 5.5;
        const GAME_DURATION = 120;
        const WIN_SCORE = 3;
        const SAFE_ZONE_DURATION = 3000;
        const SAFE_ZONE_COOLDOWN = 5000;
        
        // 用户上传的猫咪图片
        const catImage = new Image();
        catImage.src = 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJik0KSEiMEExNDk7Pj4+JS5ESUM8SDc9Pjv/2wBDAQoLCw4NDhwQEBw7KCIoOzs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozv/wAARCAA8ADwDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwAtJVhuFMjAKDyTWrda1ax2zNFPG5A5CsM1jWwSabbkjg88VU8QWMJg3lSjgfe6VmmaNGLrWpTT3RlQsM1jL9oc53HmrImYRgPng9/SrM9tcLYJd+S3kOceYF4B9DVohkNobg3KxxyHI6+1dIJJLZQXlLcc5rC0h1jumkdcqeTitu9nsntC6ueoO0r/APXqbjL8U6zQEHr7ViXNrF57cN+ZqW0uhnjoRUc7gyk5Ip3JsdBZApMSjE8duKpakyrdMjrmZuzf/rp8U7jzDGu0gcHOaj0vRr25n8+O1a6O/J3HA/M1CNWaHh3wZbXF8Lm7jaRNu5Afuse+fpXevpNq1k1r5EfkkYKbRiuAt/FOu6brqWl1HbpbxSGOaBUAZTnA29zxznoRXo5usW7NxuUEkD2q0zJo8i1PRP7MuJNkRT96+wAcBQcAk+9Z019LKRFJ8ykYzjGK07XRta1O/kvZYb8GciWSSSNlCDByAT97PAAH9Kq3GmTWy4kTlWIJ29KkpFaDKJ15FRTS/vDzV1bfapx0PNZ0kZMr+xovoO2p2mk28dzv3DGeBx1rrdLQW8axqOB61yGnyfZ7lfmHNdZa3G9AQeKmL0Kka7x20x3ukfm4wGKgtj0zWXJeNDfLpf2Wd5n+ZWCYVlzyc9OKtRSkZIGfrTH3SypI7urJnaFbAFacxCCRpgRxJgKc9OlY+qadb3YOUq8ru4+diRVW9uo4ISWPFJu5KVjhtctIbJCVOPauVgPmB23bsucHGK2vFOpC5BUFWIJ4zXP2R22qg9SSevvWctEbQ1Z1JkEL78/rmtWz1YKuWbAUcn+lZs6hsg1QkJBGCcZ6VKZTVzu7fVYm+UnmrX2kMhbI4OPpXm8V5Ojkhzyali1i+jO4TE54IPTFVzE8p6DNqKwoDkGub1/Vla3aPf8AMRxg8iuduNUu33L5pAVsDFVJJHk5dyxo5hcpVuc3EhdvvHrx1qOIbYwPSp2ReeKiUAZHvWcnoawWp//Z';
        
        // 安全重生点
        const safeRespawnPoints = [
            { x: 100, y: 100 }, { x: 900, y: 600 },
            { x: 100, y: 600 }, { x: 900, y: 100 },
            { x: 100, y: 350 }, { x: 900, y: 350 },
            { x: 400, y: 100 }, { x: 600, y: 600 }
        ];
        
        // 障碍物配置
        const obstacles = [
            { x: 500, y: 350, width: 100, height: 40 },
            { x: 300, y: 500, width: 40, height: 100 },
            { x: 700, y: 200, width: 40, height: 100 },
            { x: 200, y: 300, width: 80, height: 30 },
            { x: 750, y: 400, width: 80, height: 30 }
        ];
        
        // 安全区配置
        const safeZones = [
            { x: 150, y: 150, radius: 60, active: true },
            { x: 850, y: 550, radius: 60, active: true }
        ];
        
        // 游戏状态变量
        let gameRunning = false;
        let gameOver = false;
        let catScore = 0;
        let startTime = 0;
        let animationId = null;
        let keys = {};
        
        // 角色状态 - 使用 var 确保全局可访问
        var mousePos = { x: 700, y: 500 };
        
        let cat = { x: 200, y: 200, angle: 0, energy: 100, isBoosting: false, radius: 30 };
        let mouse = { x: 700, y: 500, angle: 0, invincibleUntil: 0, safeZoneCooldownUntil: 0, radius: 15 };
        
        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startModal = document.getElementById('startModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const winnerText = document.getElementById('winnerText');
        const finalScore = document.getElementById('finalScore');
        const gameOverReason = document.getElementById('gameOverReason');
        
        // 检查位置是否与障碍物碰撞（带边距）
        function checkCollisionWithObstacles(x, y, radius) {
            for (let obs of obstacles) {
                const margin = 5;
                if (x + radius + margin > obs.x && 
                    x - radius - margin < obs.x + obs.width &&
                    y + radius + margin > obs.y && 
                    y - radius - margin < obs.y + obs.height) {
                    return true;
                }
            }
            return false;
        }
        
        // 获取随机安全位置
        function getSafePosition(radius, otherX, otherY) {
            let pos;
            let attempts = 0;
            do {
                if (attempts < 20) {
                    pos = safeRespawnPoints[Math.floor(Math.random() * safeRespawnPoints.length)];
                    pos = {
                        x: pos.x + (Math.random() - 0.5) * 40,
                        y: pos.y + (Math.random() - 0.5) * 40
                    };
                } else {
                    pos = {
                        x: 50 + Math.random() * (CANVAS_WIDTH - 100),
                        y: 50 + Math.random() * (CANVAS_HEIGHT - 100)
                    };
                }
                attempts++;
            } while (checkCollisionWithObstacles(pos.x, pos.y, radius) || 
                     (Math.abs(pos.x - otherX) < 100 && Math.abs(pos.y - otherY) < 100));
            return pos;
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'ArrowUp') keys['w'] = true;
            if (e.key === 'ArrowDown') keys['s'] = true;
            if (e.key === 'ArrowLeft') keys['a'] = true;
            if (e.key === 'ArrowRight') keys['d'] = true;
            if (e.key === 'Shift') keys['shift'] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.key === 'ArrowUp') keys['w'] = false;
            if (e.key === 'ArrowDown') keys['s'] = false;
            if (e.key === 'ArrowLeft') keys['a'] = false;
            if (e.key === 'ArrowRight') keys['d'] = false;
            if (e.key === 'Shift') keys['shift'] = false;
        });
        
        // 鼠标事件
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mousePos.x = (e.clientX - rect.left) * scaleX;
            mousePos.y = (e.clientY - rect.top) * scaleY;
        });
        
        // 更新猫咪
        function updateCat() {
            let dx = 0, dy = 0;
            
            if (keys['w']) dy = -1;
            if (keys['s']) dy = 1;
            if (keys['a']) { dx = -1; cat.angle = Math.PI; }
            if (keys['d']) { dx = 1; cat.angle = 0; }
            
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            
            cat.isBoosting = keys['shift'] && cat.energy > 0;
            let currentSpeed = cat.isBoosting ? CAT_BOOST_SPEED : CAT_SPEED;
            
            if (cat.isBoosting && (dx !== 0 || dy !== 0)) {
                cat.energy = Math.max(0, cat.energy - 1);
            } else if (!cat.isBoosting && cat.energy < 100) {
                cat.energy = Math.min(100, cat.energy + 0.5);
            }
            
            let newX = cat.x + dx * currentSpeed;
            let newY = cat.y + dy * currentSpeed;
            
            newX = Math.max(30, Math.min(CANVAS_WIDTH - 30, newX));
            newY = Math.max(30, Math.min(CANVAS_HEIGHT - 30, newY));
            
            if (!checkCollisionWithObstacles(newX, cat.y, cat.radius)) {
                cat.x = newX;
            }
            if (!checkCollisionWithObstacles(cat.x, newY, cat.radius)) {
                cat.y = newY;
            }
        }
        
        // 更新老鼠
        function updateMouse() {
            const dx = mousePos.x - mouse.x;
            const dy = mousePos.y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 3) {
                let moveX = (dx / dist) * Math.min(dist, MOUSE_SPEED);
                let moveY = (dy / dist) * Math.min(dist, MOUSE_SPEED);
                
                let newX = mouse.x + moveX;
                let newY = mouse.y + moveY;
                
                newX = Math.max(15, Math.min(CANVAS_WIDTH - 15, newX));
                newY = Math.max(15, Math.min(CANVAS_HEIGHT - 15, newY));
                
                if (!checkCollisionWithObstacles(newX, mouse.y, mouse.radius)) {
                    mouse.x = newX;
                }
                if (!checkCollisionWithObstacles(mouse.x, newY, mouse.radius)) {
                    mouse.y = newY;
                }
                
                mouse.angle = Math.atan2(moveY, moveX);
            }
            
            // 检查安全区
            const now = Date.now();
            if (now > mouse.safeZoneCooldownUntil) {
                for (let zone of safeZones) {
                    const dist = Math.sqrt(Math.pow(mouse.x - zone.x, 2) + Math.pow(mouse.y - zone.y, 2));
                    if (dist < zone.radius && zone.active) {
                        mouse.invincibleUntil = now + SAFE_ZONE_DURATION;
                        mouse.safeZoneCooldownUntil = now + SAFE_ZONE_COOLDOWN;
                        zone.active = false;
                        setTimeout(() => { zone.active = true; }, SAFE_ZONE_COOLDOWN);
                        break;
                    }
                }
            }
        }
        
        // 检查抓捕
        function checkCatch() {
            const now = Date.now();
            if (now < mouse.invincibleUntil) return false;
            
            const dx = cat.x - mouse.x;
            const dy = cat.y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 45) {
                catScore++;
                
                // 使用安全重生点
                const catPos = getSafePosition(cat.radius, 0, 0);
                cat.x = catPos.x;
                cat.y = catPos.y;
                
                const mouseNewPos = getSafePosition(mouse.radius, cat.x, cat.y);
                mouse.x = mouseNewPos.x;
                mouse.y = mouseNewPos.y;
                
                // 重置鼠标控制目标 - 使用全局 mousePos 变量
                mousePos.x = mouse.x;
                mousePos.y = mouse.y;
                
                mouse.invincibleUntil = now + 2000;
                
                if (catScore >= WIN_SCORE) {
                    gameOver = true;
                    winnerText.textContent = '🐱 小猫获胜！';
                    winnerText.className = 'winner-cat';
                    finalScore.textContent = catScore + ' 次抓住';
                    gameOverReason.textContent = '老鼠被抓住了！';
                }
                
                return true;
            }
            return false;
        }
        
        // 检查时间
        function checkTime() {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, GAME_DURATION - elapsed);
            
            if (remaining <= 0) {
                gameOver = true;
                winnerText.textContent = '🐭 老鼠获胜！';
                winnerText.className = 'winner-mouse';
                finalScore.textContent = '坚持2分钟';
                gameOverReason.textContent = '时间到，老鼠逃脱了！';
            }
            
            return remaining;
        }
        
        // 绘制
        function draw() {
            ctx.fillStyle = '#e6f5ff';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // 网格
            ctx.strokeStyle = '#d2e1f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= CANVAS_WIDTH; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CANVAS_HEIGHT);
                ctx.stroke();
            }
            for (let i = 0; i <= CANVAS_HEIGHT; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CANVAS_WIDTH, i);
                ctx.stroke();
            }
            
            // 安全区
            const now = Date.now();
            for (let zone of safeZones) {
                if (zone.active) {
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
                    ctx.strokeStyle = '#27ae60';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#27ae60';
                    ctx.font = '30px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('🏠', zone.x, zone.y + 10);
                }
            }
            
            // 障碍物
            ctx.fillStyle = '#8b6f47';
            ctx.strokeStyle = '#5d4e37';
            ctx.lineWidth = 2;
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                ctx.moveTo(obs.x + obs.width, obs.y);
                ctx.lineTo(obs.x, obs.y + obs.height);
                ctx.stroke();
                ctx.strokeStyle = '#5d4e37';
                ctx.lineWidth = 2;
            }
            
            // 猫咪
            ctx.save();
            ctx.translate(cat.x, cat.y);
            if (cat.angle > Math.PI / 2 || cat.angle < -Math.PI / 2) {
                ctx.scale(-1, 1);
            }
            ctx.drawImage(catImage, -30, -30, 60, 60);
            ctx.restore();
            
            if (cat.isBoosting) {
                ctx.strokeStyle = 'rgba(255, 159, 67, 0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cat.x, cat.y, 35 + Math.random() * 5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // 老鼠
            ctx.save();
            ctx.translate(mouse.x, mouse.y);
            ctx.rotate(mouse.angle);
            ctx.fillStyle = '#95a5a6';
            ctx.beginPath();
            ctx.ellipse(0, 0, 15, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.arc(12, 0, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#95a5a6';
            ctx.beginPath();
            ctx.arc(10, -6, 4, 0, Math.PI * 2);
            ctx.arc(10, 6, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(-25, -8);
            ctx.stroke();
            ctx.restore();
            
            // 无敌光环
            if (now < mouse.invincibleUntil) {
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 25, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('无敌!', mouse.x, mouse.y - 30);
            }
            
            // UI
            ctx.fillStyle = 'rgba(40, 40, 60, 0.95)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, 80);
            
            ctx.fillStyle = '#ff9f43';
            ctx.font = 'bold 24px Microsoft YaHei';
            ctx.textAlign = 'left';
            ctx.fillText('🐱 小猫: ' + catScore + '/' + WIN_SCORE, 30, 50);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(30, 60, 200, 15);
            ctx.fillStyle = cat.energy > 20 ? '#ff9f43' : '#e74c3c';
            ctx.fillRect(30, 60, 200 * (cat.energy / 100), 15);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(30, 60, 200, 15);
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText('能量 (Shift冲刺)', 240, 72);
            
            const remaining = checkTime();
            if (!gameOver) {
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                const timeStr = '⏰ ' + mins + ':' + secs.toString().padStart(2, '0');
                ctx.textAlign = 'right';
                ctx.fillStyle = remaining < 30 ? '#e74c3c' : '#fff';
                ctx.font = 'bold 28px Microsoft YaHei';
                if (remaining < 30) {
                    ctx.shadowColor = '#e74c3c';
                    ctx.shadowBlur = 10;
                }
                ctx.fillText(timeStr, CANVAS_WIDTH - 30, 50);
                ctx.shadowBlur = 0;
            }
            
            ctx.textAlign = 'center';
            ctx.fillStyle = '#b4b4c8';
            ctx.font = '18px Microsoft YaHei';
            ctx.fillText('WASD控制小猫 | 鼠标控制老鼠 | Shift加速', CANVAS_WIDTH / 2, 50);
        }
        
        // 游戏循环
        function gameLoop() {
            if (!gameRunning) return;
            
            if (!gameOver) {
                updateCat();
                updateMouse();
                checkCatch();
            }
            
            draw();
            
            if (gameOver) {
                gameRunning = false;
                gameOverModal.classList.remove('hidden');
                return;
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            startModal.classList.add('hidden');
            gameOverModal.classList.add('hidden');
            
            cat = { x: 200, y: 200, angle: 0, energy: 100, isBoosting: false, radius: 30 };
            mouse = { x: 700, y: 500, angle: 0, invincibleUntil: 0, safeZoneCooldownUntil: 0, radius: 15 };
            catScore = 0;
            startTime = Date.now();
            gameRunning = true;
            gameOver = false;
            keys = {};
            mousePos = { x: 700, y: 500 };
            
            // 确保初始位置安全
            const catPos = getSafePosition(cat.radius, 0, 0);
            cat.x = catPos.x;
            cat.y = catPos.y;
            const mouseNewPos = getSafePosition(mouse.radius, cat.x, cat.y);
            mouse.x = mouseNewPos.x;
            mouse.y = mouseNewPos.y;
            mousePos.x = mouse.x;
            mousePos.y = mouse.y;
            
            gameLoop();
        }
        
        // 重新开始
        function restartGame() {
            startGame();
        }
        
        // 初始绘制
        if (catImage.complete) {
            draw();
        } else {
            catImage.onload = draw;
        }
    </script>
</body>
</html>

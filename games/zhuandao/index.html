<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>转刀侠 - 幸存者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: #1a1a2e;
            touch-action: none;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        
        .stat {
            margin: 3px 0;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        
        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            border: 3px solid #e94560;
            z-index: 100;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        
        #gameOver {
            display: none;
        }
        
        h1 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        
        h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        
        button:hover, button:active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }
        
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            line-height: 2;
        }
        
        .warning {
            color: #e94560;
            font-size: 12px;
            margin-top: 10px;
        }
        
        /* 虚拟摇杆样式 */
        #joystick-zone {
            position: absolute;
            bottom: 100px;
            left: 100px;
            width: 150px;
            height: 150px;
            z-index: 50;
            display: none;
        }
        
        .joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(233, 69, 96, 0.6);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        
        #difficulty-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            z-index: 10;
        }
        
        .elite-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px red;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: opacity 0.3s;
        }
        
        @media (max-width: 768px) {
            #ui {
                font-size: 14px;
            }
            h1 {
                font-size: 28px;
            }
            #joystick-zone {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="stat">❤️ 生命值: <span id="health">100</span>/<span id="maxHealth">100</span></div>
            <div class="stat">⭐ 分数: <span id="score">0</span></div>
            <div class="stat">📊 等级: <span id="level">1</span></div>
            <div class="stat">💀 击杀: <span id="kills">0</span></div>
            <div class="stat">⏱️ 时间: <span id="time">0</span>秒</div>
        </div>
        
        <div id="difficulty-indicator">难度: <span id="diffLevel">1</span></div>
        
        <div class="elite-warning" id="eliteWarning">精英怪来袭！</div>
        
        <div id="joystick-zone">
            <div class="joystick-base" id="joystickBase"></div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
        
        <div id="startScreen">
            <h1>⚔️ 转刀侠 ⚔️</h1>
            <p>旋转武器，生存到底！</p>
            <div class="warning">⚠️ 难度已大幅提升！</div>
            <button onclick="startGame()">开始挑战</button>
            <div class="controls">
                <p>🎮 电脑: WASD / 方向键 移动</p>
                <p>📱 手机: 左侧虚拟摇杆移动</p>
                <p>⚡ 自动旋转攻击</p>
                <p>💀 敌人会越来越强！</p>
            </div>
        </div>
        
        <div id="gameOver">
            <h2>游戏结束</h2>
            <div class="stat">最终得分: <span id="finalScore">0</span></div>
            <div class="stat">击杀数: <span id="finalKills">0</span></div>
            <div class="stat">生存时间: <span id="finalTime">0</span>秒</div>
            <div class="stat">最高等级: <span id="finalLevel">1</span></div>
            <button onclick="restartGame()">再次挑战</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 游戏状态
        let gameRunning = false;
        let gameTime = 0;
        let lastTime = 0;
        let score = 0;
        let kills = 0;
        let level = 1;
        let exp = 0;
        let expToNext = 80;
        let difficultyMultiplier = 1;
        let waveNumber = 1;
        
        // 玩家对象 - 降低初始属性增加难度
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 18,
            speed: 2.5, // 降低基础速度
            health: 80, // 降低初始生命
            maxHealth: 80,
            angle: 0,
            weapons: [],
            invincible: 0,
            regenTimer: 0
        };
        
        // 武器类 - 降低初始伤害
        class Weapon {
            constructor(angle, distance, damage, speed) {
                this.angle = angle;
                this.distance = distance;
                this.damage = damage;
                this.speed = speed;
                this.trail = [];
                this.size = 12;
            }
            
            update() {
                this.angle += this.speed;
                this.trail.push({
                    x: player.x + Math.cos(this.angle) * this.distance,
                    y: player.y + Math.sin(this.angle) * this.distance,
                    alpha: 1
                });
                if (this.trail.length > 8) this.trail.shift();
                this.trail.forEach(t => t.alpha -= 0.15);
            }
            
            getPosition() {
                return {
                    x: player.x + Math.cos(this.angle) * this.distance,
                    y: player.y + Math.sin(this.angle) * this.distance
                };
            }
        }
        
        // 初始化武器
        function initWeapons() {
            player.weapons = [];
            const weaponCount = 1 + Math.floor((level - 1) / 2);
            for (let i = 0; i < weaponCount; i++) {
                player.weapons.push(new Weapon(
                    (Math.PI * 2 / weaponCount) * i,
                    55,
                    15 + level * 3, // 降低基础伤害
                    0.1 + level * 0.005
                ));
            }
        }
        
        // 敌人类型
        const EnemyTypes = {
            NORMAL: { color: '#e74c3c', health: 1, speed: 1, damage: 1, exp: 1, radius: 15 },
            FAST: { color: '#f39c12', health: 0.6, speed: 1.8, damage: 0.8, exp: 1.2, radius: 12 },
            TANK: { color: '#8e44ad', health: 3, speed: 0.6, damage: 1.5, exp: 2, radius: 22 },
            ELITE: { color: '#c0392b', health: 5, speed: 1.2, damage: 2, exp: 5, radius: 25 },
            BOSS: { color: '#2c3e50', health: 15, speed: 0.8, damage: 4, exp: 20, radius: 40 }
        };
        
        // 敌人类
        class Enemy {
            constructor(type = 'NORMAL', isElite = false) {
                const config = EnemyTypes[type];
                const side = Math.floor(Math.random() * 4);
                const margin = 50;
                
                switch(side) {
                    case 0: this.x = Math.random() * canvas.width; this.y = -margin; break;
                    case 1: this.x = canvas.width + margin; this.y = Math.random() * canvas.height; break;
                    case 2: this.x = Math.random() * canvas.width; this.y = canvas.height + margin; break;
                    case 3: this.x = -margin; this.y = Math.random() * canvas.height; break;
                }
                
                this.type = type;
                this.isElite = isElite;
                
                // 难度缩放
                const scale = difficultyMultiplier * (isElite ? 2 : 1);
                this.radius = config.radius * (type === 'BOSS' ? 1.5 : 1);
                this.speed = config.speed * (1 + gameTime / 60000) * (isElite ? 1.3 : 1);
                this.baseHealth = 25 * config.health * scale;
                this.health = this.baseHealth;
                this.maxHealth = this.health;
                this.damage = 15 * config.damage * scale;
                this.expValue = Math.floor(10 * config.exp * scale);
                this.color = isElite ? '#ff0000' : config.color;
                
                // 精英怪特效
                this.pulse = 0;
                this.angle = 0;
            }
            
            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 0) {
                    // 精英怪和Boss有追踪加强
                    let speedMod = 1;
                    if (this.type === 'ELITE' || this.type === 'BOSS') {
                        speedMod = 1.2;
                        this.angle += 0.05;
                    }
                    
                    this.x += (dx / dist) * this.speed * speedMod;
                    this.y += (dy / dist) * this.speed * speedMod;
                }
                
                this.pulse += 0.1;
            }
            
            draw() {
                ctx.save();
                
                // 精英怪发光效果
                if (this.isElite || this.type === 'ELITE' || this.type === 'BOSS') {
                    ctx.shadowBlur = 20 + Math.sin(this.pulse) * 10;
                    ctx.shadowColor = this.color;
                }
                
                // 身体
                ctx.fillStyle = this.color;
                if (this.type === 'BOSS') {
                    // Boss绘制为多边形
                    ctx.beginPath();
                    const sides = 6;
                    for (let i = 0; i < sides; i++) {
                        const angle = (i / sides) * Math.PI * 2 + this.angle;
                        const r = this.radius * (0.8 + Math.sin(this.pulse + i) * 0.2);
                        const x = this.x + Math.cos(angle) * r;
                        const y = this.y + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
                
                // 眼睛
                ctx.fillStyle = 'white';
                const eyeOffset = this.radius * 0.3;
                ctx.beginPath();
                ctx.arc(this.x - eyeOffset, this.y - eyeOffset * 0.5, this.radius * 0.25, 0, Math.PI * 2);
                ctx.arc(this.x + eyeOffset, this.y - eyeOffset * 0.5, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x - eyeOffset, this.y - eyeOffset * 0.5, this.radius * 0.1, 0, Math.PI * 2);
                ctx.arc(this.x + eyeOffset, this.y - eyeOffset * 0.5, this.radius * 0.1, 0, Math.PI * 2);
                ctx.fill();
                
                // 精英怪标记
                if (this.isElite) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('★', this.x, this.y - this.radius - 5);
                }
                
                ctx.restore();
                
                // 血条
                const barWidth = Math.min(60, this.radius * 3);
                const barHeight = 5;
                const barY = this.y - this.radius - 12;
                
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(this.x - barWidth/2, barY, barWidth, barHeight);
                
                const healthPercent = this.health / this.maxHealth;
                ctx.fillStyle = healthPercent > 0.6 ? '#2ecc71' : healthPercent > 0.3 ? '#f1c40f' : '#e74c3c';
                ctx.fillRect(this.x - barWidth/2, barY, barWidth * healthPercent, barHeight);
                
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x - barWidth/2, barY, barWidth, barHeight);
            }
        }
        
        // 经验球类
        class ExpOrb {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.value = value;
                this.radius = 5;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.life = 400;
                this.magnetRange = 200;
            }
            
            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < this.magnetRange && dist > 0) {
                    const force = (this.magnetRange - dist) / this.magnetRange;
                    this.x += (dx / dist) * 8 * force;
                    this.y += (dy / dist) * 8 * force;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }
                
                this.life--;
            }
            
            draw() {
                const alpha = Math.min(1, this.life / 60);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#00d2ff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00d2ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 内部高光
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x - 2, this.y - 2, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 伤害数字类
        class DamageText {
            constructor(x, y, damage, isCrit = false) {
                this.x = x;
                this.y = y;
                this.damage = damage;
                this.life = 40;
                this.vy = -3;
                this.isCrit = isCrit;
                this.scale = isCrit ? 1.5 : 1;
            }
            
            update() {
                this.y += this.vy;
                this.vy *= 0.95;
                this.life--;
                this.scale *= 0.98;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 40;
                ctx.fillStyle = this.isCrit ? '#ff0000' : '#ffeb3b';
                ctx.font = `bold ${this.isCrit ? 28 : 20}px Arial`;
                ctx.textAlign = 'center';
                ctx.scale(this.scale, this.scale);
                ctx.fillText(this.damage, this.x / this.scale, this.y / this.scale);
                if (this.isCrit) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeText(this.damage, this.x / this.scale, this.y / this.scale);
                }
                ctx.restore();
            }
        }
        
        // 粒子效果类
        class Particle {
            constructor(x, y, color, speed = 1) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 6 * speed;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 25;
                this.color = color;
                this.size = Math.random() * 5 + 3;
                this.decay = Math.random() * 0.5 + 0.5;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= this.decay;
                this.size *= 0.95;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life / 25);
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.life * 0.1);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }
        
        let enemies = [];
        let expOrbs = [];
        let damageTexts = [];
        let particles = [];
        let keys = {};
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // 触摸/虚拟摇杆控制
        let joystick = {
            active: false,
            startX: 0,
            startY: 0,
            moveX: 0,
            moveY: 0,
            dx: 0,
            dy: 0
        };
        
        const joystickBase = document.getElementById('joystickBase');
        const joystickStick = document.getElementById('joystickStick');
        const joystickZone = document.getElementById('joystick-zone');
        
        // 检测是否为触摸设备
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        
        if (isTouchDevice) {
            joystickZone.style.display = 'block';
            
            // 触摸开始
            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = joystickZone.getBoundingClientRect();
                joystick.active = true;
                joystick.startX = rect.left + rect.width / 2;
                joystick.startY = rect.top + rect.height / 2;
                updateJoystick(touch.clientX, touch.clientY);
            }, { passive: false });
            
            // 触摸移动
            joystickZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (joystick.active) {
                    const touch = e.touches[0];
                    updateJoystick(touch.clientX, touch.clientY);
                }
            }, { passive: false });
            
            // 触摸结束
            const endJoystick = (e) => {
                e.preventDefault();
                joystick.active = false;
                joystick.dx = 0;
                joystick.dy = 0;
                joystickStick.style.transform = `translate(-50%, -50%)`;
            };
            
            joystickZone.addEventListener('touchend', endJoystick);
            joystickZone.addEventListener('touchcancel', endJoystick);
        }
        
        function updateJoystick(clientX, clientY) {
            const maxDist = 50;
            let dx = clientX - joystick.startX;
            let dy = clientY - joystick.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }
            
            joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            // 归一化输出
            if (dist > 10) {
                joystick.dx = dx / maxDist;
                joystick.dy = dy / maxDist;
            } else {
                joystick.dx = 0;
                joystick.dy = 0;
            }
        }
        
        // 全屏触摸移动（右侧区域）
        let touchMove = { active: false, x: 0, y: 0 };
        
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touch = e.touches[0];
            // 如果触摸在右侧区域，作为移动控制
            if (touch.clientX > window.innerWidth / 2) {
                touchMove.active = true;
                touchMove.x = touch.clientX;
                touchMove.y = touch.clientY;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            if (touchMove.active && e.touches.length > 0) {
                const touch = e.touches[0];
                const dx = touch.clientX - touchMove.x;
                const dy = touch.clientY - touchMove.y;
                
                // 直接控制移动方向
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 20) {
                    joystick.dx = dx / dist;
                    joystick.dy = dy / dist;
                    joystick.active = true;
                }
                
                touchMove.x = touch.clientX;
                touchMove.y = touch.clientY;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => {
            touchMove.active = false;
            if (!joystick.active) {
                joystick.dx = 0;
                joystick.dy = 0;
            }
        });
        
        function updatePlayer() {
            let dx = 0, dy = 0;
            
            // 键盘输入
            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;
            
            // 摇杆输入（覆盖键盘）
            if (joystick.active || (joystick.dx !== 0 || joystick.dy !== 0)) {
                dx = joystick.dx;
                dy = joystick.dy;
            }
            
            // 归一化
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len > 1) {
                    dx /= len;
                    dy /= len;
                }
            }
            
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            // 边界限制
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            
            // 无敌时间递减（更短的无敌时间增加难度）
            if (player.invincible > 0) player.invincible--;
            
            // 生命恢复（很慢）
            player.regenTimer++;
            if (player.regenTimer > 180 && player.health < player.maxHealth) {
                player.health += 0.5;
                player.regenTimer = 0;
            }
            
            // 更新武器
            player.weapons.forEach(w => w.update());
        }
        
        function checkCollisions() {
            // 武器与敌人碰撞
            player.weapons.forEach(weapon => {
                const wpos = weapon.getPosition();
                enemies.forEach((enemy, index) => {
                    const dist = Math.hypot(wpos.x - enemy.x, wpos.y - enemy.y);
                    if (dist < enemy.radius + weapon.size) {
                        // 暴击判定
                        const isCrit = Math.random() < 0.15;
                        const damage = Math.floor(weapon.damage * (isCrit ? 2 : 1));
                        
                        enemy.health -= damage;
                        damageTexts.push(new DamageText(enemy.x, enemy.y - 10, damage, isCrit));
                        
                        // 击退
                        const angle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                        const knockback = enemy.type === 'BOSS' ? 3 : 8;
                        enemy.x += Math.cos(angle) * knockback;
                        enemy.y += Math.sin(angle) * knockback;
                        
                        // 粒子
                        for (let i = 0; i < (isCrit ? 5 : 2); i++) {
                            particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                        }
                        
                        if (enemy.health <= 0) {
                            killEnemy(enemy, index);
                        }
                    }
                });
            });
            
            // 玩家与敌人碰撞 - 更严格的碰撞检测
            enemies.forEach(enemy => {
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                // 碰撞判定稍微宽松一点但伤害更高
                if (dist < player.radius + enemy.radius * 0.8) {
                    if (player.invincible === 0) {
                        // 计算伤害（精英怪和Boss伤害更高）
                        let damage = enemy.damage;
                        if (enemy.isElite) damage *= 1.5;
                        if (enemy.type === 'BOSS') damage *= 2;
                        
                        player.health -= damage;
                        player.invincible = 30; // 0.5秒无敌（更短）
                        
                        // 屏幕震动
                        canvas.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
                        setTimeout(() => canvas.style.transform = '', 100);
                        
                        // 受伤粒子
                        for (let i = 0; i < 8; i++) {
                            particles.push(new Particle(player.x, player.y, '#ff0000', 2));
                        }
                        
                        // 击退玩家
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        player.x += Math.cos(angle) * 30;
                        player.y += Math.sin(angle) * 30;
                        
                        if (player.health <= 0) {
                            endGame();
                        }
                    }
                }
            });
            
            // 收集经验球
            expOrbs.forEach((orb, index) => {
                const dist = Math.hypot(player.x - orb.x, player.y - orb.y);
                if (dist < player.radius + orb.radius + 15) {
                    score += orb.value * 5;
                    exp += orb.value;
                    expOrbs.splice(index, 1);
                    
                    for (let i = 0; i < 4; i++) {
                        particles.push(new Particle(orb.x, orb.y, '#00d2ff'));
                    }
                    
                    checkLevelUp();
                }
            });
        }
        
        function killEnemy(enemy, index) {
            kills++;
            score += enemy.expValue * 10;
            
            // 掉落经验球
            expOrbs.push(new ExpOrb(enemy.x, enemy.y, enemy.expValue));
            
            // Boss额外奖励
            if (enemy.type === 'BOSS') {
                for (let i = 0; i < 5; i++) {
                    expOrbs.push(new ExpOrb(
                        enemy.x + (Math.random() - 0.5) * 50,
                        enemy.y + (Math.random() - 0.5) * 50,
                        enemy.expValue / 2
                    ));
                }
            }
            
            // 死亡爆炸
            const particleCount = enemy.type === 'BOSS' ? 30 : enemy.type === 'ELITE' ? 15 : 8;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(enemy.x, enemy.y, enemy.color, 2));
            }
            
            enemies.splice(index, 1);
        }
        
        function checkLevelUp() {
            if (exp >= expToNext) {
                level++;
                exp -= expToNext;
                expToNext = Math.floor(expToNext * 1.3);
                
                // 升级奖励递减
                player.maxHealth += 15;
                player.health = Math.min(player.health + 20, player.maxHealth);
                player.speed += 0.1;
                
                initWeapons();
                
                // 升级特效
                for (let i = 0; i < 30; i++) {
                    const angle = (Math.PI * 2 / 30) * i;
                    particles.push(new Particle(
                        player.x + Math.cos(angle) * 40,
                        player.y + Math.sin(angle) * 40,
                        '#ffd700',
                        1.5
                    ));
                }
            }
        }
        
        let lastSpawnTime = 0;
        let eliteTimer = 0;
        
        function spawnEnemy() {
            const now = Date.now();
            const spawnInterval = Math.max(500, 2000 - (gameTime / 1000) * 50 - level * 100);
            
            if (now - lastSpawnTime > spawnInterval) {
                lastSpawnTime = now;
                
                // 根据时间和等级选择敌人类型
                let type = 'NORMAL';
                const rand = Math.random();
                const timeMinutes = gameTime / 60000;
                
                if (timeMinutes > 2 && rand < 0.2) type = 'FAST';
                if (timeMinutes > 3 && rand < 0.15) type = 'TANK';
                if (timeMinutes > 4 && rand < 0.1) type = 'ELITE';
                
                // 精英怪波次
                eliteTimer++;
                let isElite = false;
                if (eliteTimer > 20 + Math.random() * 10) {
                    isElite = true;
                    eliteTimer = 0;
                    showEliteWarning();
                }
                
                // Boss生成（每2分钟）
                if (Math.floor(gameTime / 60000) > waveNumber) {
                    waveNumber++;
                    enemies.push(new Enemy('BOSS'));
                    showEliteWarning();
                } else {
                    enemies.push(new Enemy(type, isElite));
                }
                
                // 随着时间增加敌人数量
                const extraSpawns = Math.floor(gameTime / 30000);
                for (let i = 0; i < extraSpawns && i < 3; i++) {
                    if (Math.random() < 0.5) {
                        enemies.push(new Enemy('NORMAL', Math.random() < 0.1));
                    }
                }
            }
            
            // 难度递增
            difficultyMultiplier = 1 + (gameTime / 60000) * 0.5;
            document.getElementById('diffLevel').textContent = Math.floor(difficultyMultiplier * 10) / 10;
        }
        
        function showEliteWarning() {
            const warning = document.getElementById('eliteWarning');
            warning.style.opacity = '1';
            warning.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                warning.style.opacity = '0';
                warning.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 1500);
        }
        
        function drawPlayer() {
            // 武器轨迹
            player.weapons.forEach(weapon => {
                weapon.trail.forEach((t, i) => {
                    if (t.alpha > 0) {
                        ctx.strokeStyle = `rgba(255, 215, 0, ${t.alpha * 0.6})`;
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(
                            player.x + Math.cos(weapon.angle - 0.3) * weapon.distance,
                            player.y + Math.sin(weapon.angle - 0.3) * weapon.distance
                        );
                        ctx.lineTo(t.x, t.y);
                        ctx.stroke();
                    }
                });
            });
            
            // 武器
            player.weapons.forEach(weapon => {
                const pos = weapon.getPosition();
                
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(weapon.angle);
                
                // 光晕
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffd700';
                
                // 刀刃
                ctx.fillStyle = 'linear-gradient(90deg, #c0c0c0, #ffffff, #c0c0c0)';
                ctx.fillStyle = '#e0e0e0';
                ctx.beginPath();
                ctx.moveTo(0, -weapon.size);
                ctx.lineTo(weapon.size/2, 0);
                ctx.lineTo(0, weapon.size);
                ctx.lineTo(-weapon.size/2, 0);
                ctx.closePath();
                ctx.fill();
                
                // 刀锋高光
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(0, -weapon.size * 0.8);
                ctx.lineTo(weapon.size * 0.2, 0);
                ctx.lineTo(0, weapon.size * 0.8);
                ctx.lineTo(-weapon.size * 0.2, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            });
            
            // 玩家
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 无敌闪烁
            if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) {
                ctx.globalAlpha = 0.3;
            }
            
            // 外圈光环
            ctx.strokeStyle = `rgba(52, 152, 219, ${0.5 + Math.sin(gameTime / 200) * 0.3})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius + 5, 0, Math.PI * 2);
            ctx.stroke();
            
            // 身体
            const gradient = ctx.createRadialGradient(-5, -5, 0, 0, 0, player.radius);
            gradient.addColorStop(0, '#5dade2');
            gradient.addColorStop(1, '#2874a6');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 衣服细节
            ctx.fillStyle = '#1a5276';
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 0.6, 0, Math.PI * 2);
            ctx.fill();
            
            // 眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-6, -4, 5, 0, Math.PI * 2);
            ctx.arc(6, -4, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#00d2ff';
            ctx.beginPath();
            ctx.arc(-6, -4, 2.5, 0, Math.PI * 2);
            ctx.arc(6, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // 血条
            const barWidth = 60;
            const barHeight = 8;
            const barY = player.y - 40;
            
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(player.x - barWidth/2 - 2, barY - 2, barWidth + 4, barHeight + 4);
            
            const healthPercent = player.health / player.maxHealth;
            ctx.fillStyle = healthPercent > 0.6 ? '#2ecc71' : healthPercent > 0.3 ? '#f1c40f' : '#e74c3c';
            ctx.fillRect(player.x - barWidth/2, barY, barWidth * healthPercent, barHeight);
            
            // 血条边框
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - barWidth/2, barY, barWidth, barHeight);
        }
        
        function drawBackground() {
            // 动态背景
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f0f23');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 动态网格
            ctx.strokeStyle = `rgba(255,255,255,${0.03 + Math.sin(gameTime / 1000) * 0.02})`;
            ctx.lineWidth = 1;
            const gridSize = 50;
            const offset = (gameTime / 50) % gridSize;
            
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i + offset);
                ctx.lineTo(canvas.width, i + offset);
                ctx.stroke();
            }
        }
        
        function updateUI() {
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
            document.getElementById('maxHealth').textContent = Math.floor(player.maxHealth);
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('kills').textContent = kills;
            document.getElementById('time').textContent = Math.floor(gameTime / 1000);
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            gameTime += deltaTime;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // 更新和绘制经验球
            expOrbs = expOrbs.filter(orb => orb.life > 0);
            expOrbs.forEach(orb => {
                orb.update();
                orb.draw();
            });
            
            // 生成敌人
            spawnEnemy();
            
            // 更新和绘制敌人
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
            });
            
            // 更新玩家
            updatePlayer();
            drawPlayer();
            
            // 碰撞检测
            checkCollisions();
            
            // 伤害数字
            damageTexts = damageTexts.filter(dt => dt.life > 0);
            damageTexts.forEach(dt => {
                dt.update();
                dt.draw();
            });
            
            // 粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // 经验条
            const expBarWidth = Math.min(400, canvas.width - 40);
            const expPercent = exp / expToNext;
            const barX = (canvas.width - expBarWidth) / 2;
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(barX, 15, expBarWidth, 25);
            
            const expGradient = ctx.createLinearGradient(barX, 0, barX + expBarWidth, 0);
            expGradient.addColorStop(0, '#2980b9');
            expGradient.addColorStop(1, '#00d2ff');
            ctx.fillStyle = expGradient;
            ctx.fillRect(barX, 15, expBarWidth * expPercent, 25);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, 15, expBarWidth, 25);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`LEVEL ${level}  (${exp}/${expToNext})`, canvas.width/2, 32);
            
            updateUI();
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            lastTime = performance.now();
            
            // 重置玩家位置到屏幕中心
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            
            initWeapons();
            requestAnimationFrame(gameLoop);
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('finalTime').textContent = Math.floor(gameTime / 1000);
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            // 完全重置游戏状态
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.health = 80;
            player.maxHealth = 80;
            player.speed = 2.5;
            player.invincible = 0;
            player.regenTimer = 0;
            
            score = 0;
            kills = 0;
            level = 1;
            exp = 0;
            expToNext = 80;
            gameTime = 0;
            difficultyMultiplier = 1;
            waveNumber = 1;
            eliteTimer = 0;
            
            enemies = [];
            expOrbs = [];
            damageTexts = [];
            particles = [];
            
            joystick.dx = 0;
            joystick.dy = 0;
            joystick.active = false;
            
            initWeapons();
            
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        // 防止默认触摸行为
        document.addEventListener('touchmove', (e) => {
            if (e.target === canvas || e.target === joystickZone) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // 防止空格键滚动
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>转刀侠 - 橙色风暴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: #1a1a2e;
            touch-action: none;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        
        .stat {
            margin: 3px 0;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        
        .health-stat { color: #ff6b6b; }
        .score-stat { color: #ffd93d; }
        .level-stat { color: #6bcf7f; }
        .kill-stat { color: #ff8c42; }
        
        #gameOver, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            border: 3px solid #ff8c42;
            z-index: 1000;
            min-width: 320px;
            box-shadow: 0 0 40px rgba(255, 140, 66, 0.6);
            pointer-events: auto;
        }
        
        #gameOver { display: none; }
        
        h1 {
            color: #ff8c42;
            margin-bottom: 20px;
            font-size: 42px;
            text-shadow: 0 0 20px rgba(255, 140, 66, 0.8);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        h2 {
            color: #ff8c42;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff8c42, #ffa94d);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
            transition: all 0.3s;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-touch-callout: default;
            user-select: none;
            display: inline-block;
            text-decoration: none;
        }
        
        .btn:hover, .btn:active {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 140, 66, 0.6);
        }
        
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            line-height: 2;
        }
        
        #joystick-zone {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 200px;
            height: 200px;
            z-index: 50;
            display: none;
            pointer-events: auto;
        }
        
        .joystick-base {
            position: absolute;
            width: 160px;
            height: 160px;
            background: rgba(255, 140, 66, 0.15);
            border: 4px solid rgba(255, 140, 66, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(255, 140, 66, 0.3);
            pointer-events: none;
        }
        
        .joystick-stick {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff8c42, #ff6b35);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px rgba(255, 140, 66, 0.8);
            transition: transform 0.05s;
            pointer-events: none;
        }
        
        .joystick-stick.active {
            background: linear-gradient(135deg, #ffa94d, #ff8c42);
            box-shadow: 0 0 35px rgba(255, 165, 77, 1);
        }
        
        #touch-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 140, 66, 0.6);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 40;
            transform: translate(-50%, -50%);
        }
        
        #touch-indicator.active {
            opacity: 1;
            background: rgba(255, 140, 66, 0.2);
        }
        
        #difficulty-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff8c42;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            z-index: 10;
        }
        
        .warning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: all 0.3s;
            text-align: center;
            white-space: nowrap;
        }
        
        .heal-notify {
            position: absolute;
            color: #00ff88;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 15px #00ff88;
            pointer-events: none;
            z-index: 80;
            animation: floatUp 1.2s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }
        
        /* Boss血条 */
        #boss-health {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            display: none;
            z-index: 20;
        }
        
        .boss-name {
            text-align: center;
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
            margin-bottom: 5px;
        }
        
        .boss-bar-container {
            background: rgba(0,0,0,0.8);
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            padding: 4px;
            height: 30px;
        }
        
        .boss-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff0040, #ff6b6b);
            border-radius: 6px;
            transition: width 0.2s;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }
        
        @media (max-width: 768px) {
            #ui { font-size: 14px; }
            h1 { font-size: 28px; }
            #joystick-zone { display: block; }
            .btn { padding: 18px 45px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="stat health-stat">❤️ <span id="health">100</span>/<span id="maxHealth">100</span></div>
            <div class="stat score-stat">⭐ <span id="score">0</span></div>
            <div class="stat level-stat">📊 Lv.<span id="level">1</span></div>
            <div class="stat kill-stat">💀 <span id="kills">0</span></div>
            <div class="stat">⏱️ <span id="time">0</span>s</div>
        </div>
        
        <div id="difficulty-indicator">难度: <span id="diffLevel">1.0</span></div>
        
        <div id="boss-health">
            <div class="boss-name" id="bossName">魔王降临</div>
            <div class="boss-bar-container">
                <div class="boss-bar" id="bossBar" style="width: 100%"></div>
            </div>
        </div>
        
        <div class="warning" id="eliteWarning">⚠️ 精英怪来袭！</div>
        
        <div id="touch-indicator"></div>
        
        <div id="joystick-zone">
            <div class="joystick-base"></div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
        
        <div id="startScreen">
            <h1>⚔️ 转刀侠 ⚔️</h1>
            <p>橙色风暴 | 爽快操作 | 热血战斗</p>
            <div class="btn" id="startBtn">开始冒险</div>
            <div class="controls">
                <p>🎮 电脑: WASD / 方向键 移动</p>
                <p>📱 手机: 左下角摇杆 或 全屏滑动</p>
                <p>💚 收集绿色心形恢复生命</p>
                <p>👹 击败精英怪和BOSS获得大量奖励</p>
            </div>
        </div>
        
        <div id="gameOver">
            <h2>游戏结束</h2>
            <div class="stat">最终得分: <span id="finalScore">0</span></div>
            <div class="stat">击杀数: <span id="finalKills">0</span></div>
            <div class="stat">生存时间: <span id="finalTime">0</span>秒</div>
            <div class="stat">最高等级: <span id="finalLevel">1</span></div>
            <div class="btn" id="restartBtn">再次挑战</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
            }
        });
        
        // 游戏状态
        let gameRunning = false;
        let gameTime = 0;
        let lastTime = 0;
        let score = 0;
        let kills = 0;
        let level = 1;
        let exp = 0;
        let expToNext = 100;
        let difficultyMultiplier = 1;
        let bossActive = false;
        let currentBoss = null;
        
        // 玩家配置
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 22,
            speed: 3.5,
            maxSpeed: 6,
            health: 100,
            maxHealth: 100,
            angle: 0,
            weapons: [],
            invincible: 0,
            animFrame: 0,
            capeWave: 0,
            glowIntensity: 0,
            vx: 0,
            vy: 0,
            friction: 0.88,
            acceleration: 0.6
        };
        
        // 武器类
        class Weapon {
            constructor(angle, distance, damage, speed) {
                this.angle = angle;
                this.distance = distance;
                this.damage = damage;
                this.speed = speed;
                this.trail = [];
                this.particles = [];
                this.size = 16;
                this.rotation = 0;
            }
            
            update() {
                this.angle += this.speed;
                this.rotation += 0.2;
                
                const x = player.x + Math.cos(this.angle) * this.distance;
                const y = player.y + Math.sin(this.angle) * this.distance;
                
                this.trail.push({ x, y, alpha: 1, scale: 1, angle: this.angle });
                if (this.trail.length > 12) this.trail.shift();
                
                this.trail.forEach(t => {
                    t.alpha -= 0.07;
                    t.scale *= 0.96;
                });
                
                if (Math.random() < 0.3) {
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 20,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        life: 20,
                        color: `hsl(${25 + Math.random() * 30}, 100%, 65%)`,
                        size: Math.random() * 3 + 2
                    });
                }
                
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    return p.life > 0;
                });
            }
            
            getPosition() {
                return {
                    x: player.x + Math.cos(this.angle) * this.distance,
                    y: player.y + Math.sin(this.angle) * this.distance
                };
            }
        }
        
        function initWeapons() {
            player.weapons = [];
            const weaponCount = Math.min(6, 1 + Math.floor((level - 1) / 3));
            for (let i = 0; i < weaponCount; i++) {
                player.weapons.push(new Weapon(
                    (Math.PI * 2 / weaponCount) * i,
                    65 + level * 2,
                    20 + level * 3,
                    0.12 + level * 0.005
                ));
            }
        }
        
        // 敌人类型配置
        const EnemyTypes = {
            NORMAL: { 
                color: '#e74c3c', 
                healthMult: 1, 
                speed: 1, 
                damage: 1, 
                exp: 1, 
                radius: 16,
                rewardChance: 0.1
            },
            FAST: { 
                color: '#f39c12', 
                healthMult: 0.6, 
                speed: 1.7, 
                damage: 0.8, 
                exp: 1.2, 
                radius: 14,
                rewardChance: 0.15
            },
            TANK: { 
                color: '#8e44ad', 
                healthMult: 3.5, 
                speed: 0.65, 
                damage: 1.5, 
                exp: 2.5, 
                radius: 26,
                rewardChance: 0.35
            },
            ELITE: { 
                color: '#c0392b', 
                healthMult: 10, 
                speed: 1.3, 
                damage: 2.5, 
                exp: 12, 
                radius: 32,
                rewardChance: 1.0,
                healDrop: true
            }
        };
        
        // Boss配置 - 多阶段强力Boss
        const BossTypes = {
            DESTROYER: {
                name: "毁灭者·巴尔",
                color: '#8b0000',
                healthMult: 50,
                speed: 0.9,
                damage: 8,
                exp: 100,
                radius: 55,
                phases: 3,
                skills: ['charge', 'summon', 'laser']
            },
            OVERLORD: {
                name: "虚空领主·扎昆",
                color: '#4b0082',
                healthMult: 80,
                speed: 0.7,
                damage: 12,
                exp: 200,
                radius: 70,
                phases: 4,
                skills: ['teleport', 'blackhole', 'minions']
            },
            APOCALYPSE: {
                name: "天启·末日使者",
                color: '#2c0000',
                healthMult: 150,
                speed: 1.1,
                damage: 20,
                exp: 500,
                radius: 90,
                phases: 5,
                skills: ['meteor', 'armageddon', 'healblock']
            }
        };
        
        // 普通敌人类
        class Enemy {
            constructor(type = 'NORMAL', isElite = false) {
                const config = EnemyTypes[type];
                const side = Math.floor(Math.random() * 4);
                const margin = 80;
                
                switch(side) {
                    case 0: this.x = Math.random() * canvas.width; this.y = -margin; break;
                    case 1: this.x = canvas.width + margin; this.y = Math.random() * canvas.height; break;
                    case 2: this.x = Math.random() * canvas.width; this.y = canvas.height + margin; break;
                    case 3: this.x = -margin; this.y = Math.random() * canvas.height; break;
                }
                
                this.type = type;
                this.isElite = isElite;
                
                const scale = difficultyMultiplier * (isElite ? 2.5 : 1);
                this.radius = config.radius;
                this.speed = config.speed * (1 + gameTime / 100000);
                this.baseHealth = 40 * config.healthMult * scale;
                this.health = this.baseHealth;
                this.maxHealth = this.health;
                this.damage = 15 * config.damage * (isElite ? 1.8 : 1);
                this.expValue = Math.floor(20 * config.exp * scale);
                this.color = config.color;
                this.config = config;
                
                this.pulse = 0;
                this.angle = 0;
                this.spawnScale = 0;
            }
            
            update() {
                if (this.spawnScale < 1) this.spawnScale += 0.08;
                
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 0) {
                    let speedMod = this.isElite ? 1.3 : 1;
                    if (this.isElite) this.angle += 0.06;
                    
                    this.x += (dx / dist) * this.speed * speedMod;
                    this.y += (dy / dist) * this.speed * speedMod;
                }
                
                this.pulse += 0.08;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.spawnScale, this.spawnScale);
                
                if (this.isElite) {
                    ctx.shadowBlur = 25 + Math.sin(this.pulse) * 10;
                    ctx.shadowColor = this.color;
                    
                    ctx.strokeStyle = `rgba(255, 200, 100, ${0.4 + Math.sin(this.pulse) * 0.2})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    const ringRadius = this.radius + 12 + Math.sin(this.pulse * 2) * 4;
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + this.angle;
                        ctx.lineTo(Math.cos(angle) * ringRadius, Math.sin(angle) * ringRadius);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
                
                const grad = ctx.createRadialGradient(-6, -6, 0, 0, 0, this.radius);
                grad.addColorStop(0, lightenColor(this.color, 40));
                grad.addColorStop(1, this.color);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                const eyeOffset = this.radius * 0.3;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-eyeOffset, -eyeOffset * 0.3, this.radius * 0.22, 0, Math.PI * 2);
                ctx.arc(eyeOffset, -eyeOffset * 0.3, this.radius * 0.22, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-eyeOffset, -eyeOffset * 0.3, this.radius * 0.1, 0, Math.PI * 2);
                ctx.arc(eyeOffset, -eyeOffset * 0.3, this.radius * 0.1, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.isElite) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = `bold ${this.radius}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('★', 0, -this.radius - 8);
                }
                
                ctx.restore();
                
                const barWidth = this.isElite ? 90 : 55;
                const barHeight = this.isElite ? 10 : 6;
                const barY = this.y - this.radius - (this.isElite ? 25 : 18);
                
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(this.x - barWidth/2 - 2, barY - 2, barWidth + 4, barHeight + 4);
                
                const healthPercent = this.health / this.maxHealth;
                ctx.fillStyle = healthPercent > 0.6 ? '#00ff88' : healthPercent > 0.3 ? '#ffd700' : '#ff0040';
                ctx.fillRect(this.x - barWidth/2, barY, barWidth * healthPercent, barHeight);
                
                if (this.isElite) {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(this.x - barWidth/2, barY, barWidth, barHeight);
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 13px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${Math.floor(this.health)}/${Math.floor(this.maxHealth)}`, this.x, barY - 10);
                }
            }
        }
        
        // Boss类 - 多阶段强力Boss
        class Boss {
            constructor(type) {
                const config = BossTypes[type];
                this.type = type;
                this.config = config;
                this.name = config.name;
                
                // 从屏幕外生成
                const side = Math.floor(Math.random() * 4);
                const margin = 150;
                switch(side) {
                    case 0: this.x = canvas.width/2; this.y = -margin; break;
                    case 1: this.x = canvas.width + margin; this.y = canvas.height/2; break;
                    case 2: this.x = canvas.width/2; this.y = canvas.height + margin; break;
                    case 3: this.x = -margin; this.y = canvas.height/2; break;
                }
                
                this.radius = config.radius;
                this.speed = config.speed;
                this.maxHealth = 500 * config.healthMult * difficultyMultiplier;
                this.health = this.maxHealth;
                this.damage = config.damage * difficultyMultiplier;
                this.expValue = config.exp;
                
                this.phase = 1;
                this.maxPhase = config.phases;
                this.phaseHealth = this.maxHealth / this.maxPhase;
                
                this.angle = 0;
                this.pulse = 0;
                this.spawnScale = 0;
                this.invulnerable = 0;
                
                // 技能冷却
                this.skillCooldown = 0;
                this.minions = [];
                this.charging = false;
                this.chargeTarget = { x: 0, y: 0 };
            }
            
            update() {
                if (this.spawnScale < 1) this.spawnScale += 0.03;
                
                // 阶段转换检查
                const currentPhaseHealth = this.phase * this.phaseHealth;
                if (this.health <= this.maxHealth - currentPhaseHealth && this.phase < this.maxPhase) {
                    this.phase++;
                    this.invulnerable = 120; // 2秒无敌
                    this.onPhaseChange();
                }
                
                if (this.invulnerable > 0) this.invulnerable--;
                
                // 行为模式
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // 冲锋技能
                if (this.config.skills.includes('charge') && !this.charging && this.skillCooldown <= 0 && dist > 200) {
                    this.charging = true;
                    this.chargeTarget = { x: player.x, y: player.y };
                    this.skillCooldown = 180;
                }
                
                if (this.charging) {
                    // 冲锋移动
                    const chargeDx = this.chargeTarget.x - this.x;
                    const chargeDy = this.chargeTarget.y - this.y;
                    const chargeDist = Math.sqrt(chargeDx * chargeDx + chargeDy * chargeDy);
                    
                    if (chargeDist > 30) {
                        this.x += (chargeDx / chargeDist) * this.speed * 4;
                        this.y += (chargeDy / chargeDist) * this.speed * 4;
                        
                        // 冲锋粒子效果
                        for (let i = 0; i < 3; i++) {
                            particles.push(new Particle(
                                this.x + (Math.random() - 0.5) * this.radius,
                                this.y + (Math.random() - 0.5) * this.radius,
                                '#ff0000',
                                2
                            ));
                        }
                    } else {
                        this.charging = false;
                    }
                } else {
                    // 正常追踪
                    if (dist > 100) {
                        this.x += (dx / dist) * this.speed * (1 + this.phase * 0.2);
                        this.y += (dy / dist) * this.speed * (1 + this.phase * 0.2);
                    }
                }
                
                // 召唤技能
                if (this.config.skills.includes('summon') && this.skillCooldown <= 0 && enemies.length < 10) {
                    this.summonMinions();
                    this.skillCooldown = 300;
                }
                
                if (this.skillCooldown > 0) this.skillCooldown--;
                
                this.angle += 0.03 + this.phase * 0.01;
                this.pulse += 0.1;
                
                // 更新小怪
                this.minions = this.minions.filter(m => m.health > 0);
                this.minions.forEach(m => {
                    const mdx = player.x - m.x;
                    const mdy = player.y - m.y;
                    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mdist > 0) {
                        m.x += (mdx / mdist) * m.speed;
                        m.y += (mdy / mdist) * m.speed;
                    }
                });
            }
            
            onPhaseChange() {
                // 阶段转换特效
                for (let i = 0; i < 50; i++) {
                    const angle = (i / 50) * Math.PI * 2;
                    particles.push(new Particle(
                        this.x + Math.cos(angle) * this.radius,
                        this.y + Math.sin(angle) * this.radius,
                        '#ff0000',
                        3
                    ));
                }
                
                // 回血
                this.health += this.phaseHealth * 0.2;
                
                // 显示警告
                showWarning(`🔥 ${this.name} 进入第${this.phase}阶段！`);
            }
            
            summonMinions() {
                for (let i = 0; i < 3 + this.phase; i++) {
                    const angle = (i / (3 + this.phase)) * Math.PI * 2;
                    const minion = {
                        x: this.x + Math.cos(angle) * 80,
                        y: this.y + Math.sin(angle) * 80,
                        radius: 12,
                        speed: 2.5,
                        health: 50 * this.phase,
                        color: '#660000'
                    };
                    this.minions.push(minion);
                    
                    // 添加到主敌人列表
                    const enemy = new Enemy('NORMAL');
                    enemy.x = minion.x;
                    enemy.y = minion.y;
                    enemy.health = minion.health;
                    enemy.speed = minion.speed;
                    enemy.radius = minion.radius;
                    enemy.color = minion.color;
                    enemy.isMinion = true;
                    enemies.push(enemy);
                }
            }
            
            takeDamage(damage) {
                if (this.invulnerable > 0) return 0;
                this.health -= damage;
                return damage;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.spawnScale, this.spawnScale);
                
                // 无敌闪烁
                if (this.invulnerable > 0 && Math.floor(this.invulnerable / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 巨大光环
                ctx.shadowBlur = 40 + Math.sin(this.pulse) * 20;
                ctx.shadowColor = this.config.color;
                
                // 阶段光环
                for (let i = 0; i < this.phase; i++) {
                    ctx.strokeStyle = `rgba(255, 0, 0, ${0.3 - i * 0.05})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    const ringRadius = this.radius + 20 + i * 15 + Math.sin(this.pulse + i) * 5;
                    ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // Boss身体 - 多边形随阶段变化
                ctx.fillStyle = this.config.color;
                ctx.beginPath();
                const sides = 6 + this.phase * 2;
                for (let i = 0; i < sides * 2; i++) {
                    const angle = (i / (sides * 2)) * Math.PI * 2 + this.angle;
                    const r = i % 2 === 0 ? this.radius : this.radius * (0.5 + this.phase * 0.1);
                    ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fill();
                
                // 内部核心
                const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 0.5);
                coreGradient.addColorStop(0, '#ff0000');
                coreGradient.addColorStop(1, '#660000');
                ctx.fillStyle = coreGradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * (0.3 + this.phase * 0.05), 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.2, this.radius * 0.15, 0, Math.PI * 2);
                ctx.arc(this.radius * 0.3, -this.radius * 0.2, this.radius * 0.15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.2, this.radius * 0.08, 0, Math.PI * 2);
                ctx.arc(this.radius * 0.3, -this.radius * 0.2, this.radius * 0.08, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                
                // 更新Boss血条UI
                updateBossUI();
            }
        }

        // 其他类定义（HealItem, ExpOrb, DamageText, Particle）保持不变...
        class HealItem {
            constructor(x, y, amount = 35) {
                this.x = x;
                this.y = y;
                this.amount = amount;
                this.radius = 14;
                this.bobOffset = Math.random() * Math.PI * 2;
                this.life = 800;
                this.magnetRange = 200;
                this.rotation = 0;
            }
            
            update() {
                this.bobOffset += 0.06;
                this.rotation += 0.02;
                this.life--;
                
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < this.magnetRange && dist > 0) {
                    const force = Math.pow((this.magnetRange - dist) / this.magnetRange, 2) * 8;
                    this.x += (dx / dist) * force;
                    this.y += (dy / dist) * force;
                }
            }
            
            draw() {
                const bobY = Math.sin(this.bobOffset) * 6;
                const alpha = Math.min(1, this.life / 100);
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x, this.y + bobY);
                ctx.rotate(this.rotation);
                
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#00ff88';
                
                ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                const topCurveHeight = this.radius * 0.3;
                ctx.moveTo(0, topCurveHeight);
                ctx.bezierCurveTo(-this.radius, -this.radius * 0.5, -this.radius, -this.radius * 0.8, 0, -this.radius * 0.2);
                ctx.bezierCurveTo(this.radius, -this.radius * 0.8, this.radius, -this.radius * 0.5, 0, topCurveHeight);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath();
                ctx.arc(-this.radius * 0.3, -this.radius * 0.4, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class ExpOrb {
            constructor(x, y, value) {
                this.x = x;
                this.y = y;
                this.value = value;
                this.radius = 7;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 600;
                this.magnetRange = 180;
                this.pulse = 0;
            }
            
            update() {
                this.pulse += 0.1;
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < this.magnetRange && dist > 0) {
                    const force = Math.pow((this.magnetRange - dist) / this.magnetRange, 2) * 10;
                    this.x += (dx / dist) * force;
                    this.y += (dy / dist) * force;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.94;
                    this.vy *= 0.94;
                }
                
                this.life--;
            }
            
            draw() {
                const alpha = Math.min(1, this.life / 80);
                const scale = 1 + Math.sin(this.pulse) * 0.1;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x, this.y);
                ctx.scale(scale, scale);
                
                ctx.fillStyle = '#ff8c42';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff8c42';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-3, -3, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class DamageText {
            constructor(x, y, damage, isCrit = false) {
                this.x = x;
                this.y = y;
                this.damage = damage;
                this.life = 45;
                this.vy = -3;
                this.isCrit = isCrit;
                this.scale = isCrit ? 2 : 1;
                this.vx = (Math.random() - 0.5) * 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy *= 0.92;
                this.life--;
                this.scale *= 0.985;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 45;
                ctx.fillStyle = this.isCrit ? '#ff0040' : '#ffaa00';
                ctx.font = `bold ${this.isCrit ? 36 : 24}px Arial`;
                ctx.textAlign = 'center';
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                ctx.fillText(this.damage, 0, 0);
                
                if (this.isCrit) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeText(this.damage, 0, 0);

        class Particle {
            constructor(x, y, color, speed = 1, size = null) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 8 * speed;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 35;
                this.color = color;
                this.size = size || Math.random() * 6 + 3;
                this.decay = Math.random() * 0.4 + 0.6;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = (Math.random() - 0.5) * 0.3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= this.decay;
                this.size *= 0.96;
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life / 35);
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }
        
        let enemies = [];
        let expOrbs = [];
        let healItems = [];
        let damageTexts = [];
        let particles = [];
        let keys = {};
        
        // 输入系统
        const Input = {
            dx: 0,
            dy: 0,
            active: false,
            touchId: null,
            joystick: { active: false, x: 0, y: 0, originX: 0, originY: 0 },
            
            reset() {
                this.dx = 0;
                this.dy = 0;
                this.active = false;
            }
        };
        
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        
        // 触摸控制
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystickStick');
        const touchIndicator = document.getElementById('touch-indicator');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        
        if (isTouchDevice) {
            joystickZone.style.display = 'block';
            
            function getJoystickCenter() {
                const rect = joystickZone.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }
            
            function handleTouchStart(e) {
                // 如果点击在按钮上，不处理
                if (e.target.closest('.btn')) return;
                
                const touch = e.changedTouches[0];
                const jCenter = getJoystickCenter();
                const distToJoystick = Math.hypot(touch.clientX - jCenter.x, touch.clientY - jCenter.y);
                
                if (distToJoystick < 120) {
                    Input.joystick.active = true;
                    Input.joystick.originX = jCenter.x;
                    Input.joystick.originY = jCenter.y;
                    updateJoystick(touch.clientX, touch.clientY);
                    joystickStick.classList.add('active');
                } else {
                    Input.touchId = touch.identifier;
                    Input.active = true;
                    updateTouchFollow(touch.clientX, touch.clientY);
                }
            }
            
            function handleTouchMove(e) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    
                    if (Input.joystick.active) {
                        updateJoystick(touch.clientX, touch.clientY);
                    } else if (touch.identifier === Input.touchId && Input.active) {
                        updateTouchFollow(touch.clientX, touch.clientY);
                    }
                }
            }
            
            function handleTouchEnd(e) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    
                    if (Input.joystick.active && !e.touches.length) {
                        Input.joystick.active = false;
                        joystickStick.style.transform = `translate(-50%, -50%)`;
                        joystickStick.classList.remove('active');
                        Input.dx = 0;
                        Input.dy = 0;
                    } else if (touch.identifier === Input.touchId) {
                        Input.active = false;
                        Input.touchId = null;
                        touchIndicator.classList.remove('active');
                    }
                }
            }
            
            function updateJoystick(clientX, clientY) {
                const maxDist = 60;
                let dx = clientX - Input.joystick.originX;
                let dy = clientY - Input.joystick.originY;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 12) {
                    Input.dx = 0;
                    Input.dy = 0;
                    joystickStick.style.transform = `translate(-50%, -50%)`;
                    return;
                }
                
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }
                
                joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                const normalizedDist = Math.min(dist, maxDist);
                const intensity = (normalizedDist - 12) / (maxDist - 12);
                Input.dx = (dx / dist) * intensity;
                Input.dy = (dy / dist) * intensity;
            }
            
            function updateTouchFollow(x, y) {
                const dx = x - player.x;
                const dy = y - player.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 30) {
                    Input.dx = dx / dist;
                    Input.dy = dy / dist;
                    
                    touchIndicator.style.left = x + 'px';
                    touchIndicator.style.top = y + 'px';
                    touchIndicator.classList.add('active');
                }
            }
            
            // 使用 passive: false 确保可以阻止默认行为
            document.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', handleTouchEnd, { passive: false });
            document.addEventListener('touchcancel', handleTouchEnd, { passive: false });
        }
        
        function lightenColor(color, percent) {
            const num = parseInt(color.replace("#",""),16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return "#" + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
        }
        
        function updatePlayer() {
            let dx = 0, dy = 0;
            
            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;
            
            if (Input.joystick.active || Input.active) {
                dx = Input.dx;
                dy = Input.dy;
            }
            
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len > 1) { dx /= len; dy /= len; }
            }
            
            player.vx += dx * player.acceleration;
            player.vy += dy * player.acceleration;
            
            player.vx *= player.friction;
            player.vy *= player.friction;
            
            const speed = Math.hypot(player.vx, player.vy);
            if (speed > player.maxSpeed) {
                player.vx = (player.vx / speed) * player.maxSpeed;
                player.vy = (player.vy / speed) * player.maxSpeed;
            }
            
            player.x += player.vx;
            player.y += player.vy;
            
            if (player.x < player.radius) {
                player.x = player.radius;
                player.vx *= -0.5;
            }
            if (player.x > canvas.width - player.radius) {
                player.x = canvas.width - player.radius;
                player.vx *= -0.5;
            }
            if (player.y < player.radius) {
                player.y = player.radius;
                player.vy *= -0.5;
            }
            if (player.y > canvas.height - player.radius) {
                player.y = canvas.height - player.radius;
                player.vy *= -0.5;
            }
            
            if (player.invincible > 0) player.invincible--;
            player.animFrame += 0.12;
            player.capeWave += 0.2;
            player.glowIntensity = 0.6 + Math.sin(player.animFrame) * 0.4;
            
            player.weapons.forEach(w => w.update());
        }
        
        function checkCollisions() {
            // 武器攻击
            player.weapons.forEach(weapon => {
                const wpos = weapon.getPosition();
                
                // 攻击Boss
                if (currentBoss) {
                    const dist = Math.hypot(wpos.x - currentBoss.x, wpos.y - currentBoss.y);
                    if (dist < currentBoss.radius + weapon.size) {
                        const isCrit = Math.random() < 0.2;
                        const damage = Math.floor(weapon.damage * (isCrit ? 2.2 : 1) * (0.9 + Math.random() * 0.2));
                        const actualDamage = currentBoss.takeDamage(damage);
                        
                        if (actualDamage > 0) {
                            damageTexts.push(new DamageText(currentBoss.x, currentBoss.y - 40, actualDamage, isCrit));
                            
                            for (let i = 0; i < (isCrit ? 8 : 4); i++) {
                                particles.push(new Particle(currentBoss.x, currentBoss.y, '#ff0000'));
                            }
                            
                            if (currentBoss.health <= 0) {
                                killBoss();
                            }
                        }
                    }
                }
                
                // 攻击普通敌人
                enemies.forEach((enemy, index) => {
                    const dist = Math.hypot(wpos.x - enemy.x, wpos.y - enemy.y);
                    if (dist < enemy.radius + weapon.size) {
                        const isCrit = Math.random() < 0.2;
                        const damage = Math.floor(weapon.damage * (isCrit ? 2.2 : 1) * (0.9 + Math.random() * 0.2));
                        
                        enemy.health -= damage;
                        damageTexts.push(new DamageText(enemy.x, enemy.y - 20, damage, isCrit));
                        
                        const angle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                        const knockback = enemy.isElite ? 2 : 6;
                        enemy.x += Math.cos(angle) * knockback;
                        enemy.y += Math.sin(angle) * knockback;
                        
                        for (let i = 0; i < (isCrit ? 6 : 3); i++) {
                            particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                        }
                        
                        if (enemy.health <= 0) {
                            killEnemy(enemy, index);
                        }
                    }
                });
            });
            
            // 玩家受伤
            if (currentBoss) {
                const dist = Math.hypot(player.x - currentBoss.x, player.y - currentBoss.y);
                if (dist < player.radius + currentBoss.radius * 0.7) {
                    if (player.invincible === 0) {
                        const damage = currentBoss.damage;
                        player.health -= damage;
                        player.invincible = 40;
                        
                        const angle = Math.atan2(player.y - currentBoss.y, player.x - currentBoss.x);
                        player.vx += Math.cos(angle) * 20;
                        player.vy += Math.sin(angle) * 20;
                        
                        for (let i = 0; i < 15; i++) {
                            particles.push(new Particle(player.x, player.y, '#ff0000', 2));
                        }
                        
                        if (player.health <= 0) endGame();
                    }
                }
            }
            
            enemies.forEach(enemy => {
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < player.radius + enemy.radius * 0.75) {
                    if (player.invincible === 0) {
                        const damage = enemy.damage;
                        player.health -= damage;
                        player.invincible = 35;
                        
                        const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        player.vx += Math.cos(angle) * 15;
                        player.vy += Math.sin(angle) * 15;
                        
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(player.x, player.y, '#ff6b6b', 2));
                        }
                        
                        if (player.health <= 0) endGame();
                    }
                }
            });
            
            // 收集物品
            expOrbs.forEach((orb, i) => {
                if (Math.hypot(player.x - orb.x, player.y - orb.y) < player.radius + orb.radius + 20) {
                    score += orb.value * 5;
                    exp += orb.value;
                    expOrbs.splice(i, 1);
                    for (let j = 0; j < 5; j++) particles.push(new Particle(orb.x, orb.y, '#ff8c42'));
                    checkLevelUp();
                }
            });
            
            healItems.forEach((item, i) => {
                if (Math.hypot(player.x - item.x, player.y - item.y) < player.radius + item.radius + 15) {
                    const healAmount = Math.min(item.amount, player.maxHealth - player.health);
                    player.health = Math.min(player.health + item.amount, player.maxHealth);
                    healItems.splice(i, 1);
                    showHealNotification(player.x, player.y - 50, healAmount);
                    for (let j = 0; j < 15; j++) {
                        particles.push(new Particle(player.x, player.y, '#00ff88', 1.8));
                    }
                }
            });
        }
        
        function showHealNotification(x, y, amount) {
            const div = document.createElement('div');
            div.className = 'heal-notify';
            div.textContent = `+${amount} ❤️`;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.getElementById('gameContainer').appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }
        
        function killEnemy(enemy, index) {
            kills++;
            score += enemy.expValue * 10;
            
            expOrbs.push(new ExpOrb(enemy.x, enemy.y, enemy.expValue));
            
            if (enemy.config.rewardChance >= 1.0 || Math.random() < enemy.config.rewardChance) {
                const healCount = enemy.config.multipleHeal || 1;
                for (let i = 0; i < healCount; i++) {
                    setTimeout(() => {
                        healItems.push(new HealItem(
                            enemy.x + (Math.random() - 0.5) * 50,
                            enemy.y + (Math.random() - 0.5) * 50,
                            enemy.isElite ? 50 : 30
                        ));
                    }, i * 150);
                }
            }
            
            const particleCount = enemy.isElite ? 30 : 15;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(enemy.x, enemy.y, enemy.color, 3));
            }
            
            enemies.splice(index, 1);
        }
        
        function killBoss() {
            // Boss死亡奖励
            score += currentBoss.expValue * 20;
            kills += 5;
            
            // 大量经验球
            for (let i = 0; i < 10; i++) {
                expOrbs.push(new ExpOrb(
                    currentBoss.x + (Math.random() - 0.5) * 100,
                    currentBoss.y + (Math.random() - 0.5) * 100,
                    currentBoss.expValue / 5
                ));
            }
            
            // 大量血瓶
            for (let i = 0; i < 5; i++) {
                healItems.push(new HealItem(
                    currentBoss.x + (Math.random() - 0.5) * 120,
                    currentBoss.y + (Math.random() - 0.5) * 120,
                    80
                ));
            }
            
            // 爆炸特效
            for (let i = 0; i < 100; i++) {
                const angle = (i / 100) * Math.PI * 2;
                particles.push(new Particle(
                    currentBoss.x + Math.cos(angle) * currentBoss.radius,
                    currentBoss.y + Math.sin(angle) * currentBoss.radius,
                    '#ff0000',
                    4
                ));
            }
            
            showWarning(`☠️ ${currentBoss.name} 被击败！`);
            currentBoss = null;
            bossActive = false;
        }
        
        function checkLevelUp() {
            if (exp >= expToNext) {
                level++;
                exp -= expToNext;
                expToNext = Math.floor(expToNext * 1.25);
                
                player.maxHealth += 20;
                player.health += 30;
                player.maxSpeed += 0.15;
                player.acceleration += 0.03;
                
                initWeapons();
                
                for (let i = 0; i < 50; i++) {
                    const angle = (Math.PI * 2 / 50) * i;
                    particles.push(new Particle(
                        player.x + Math.cos(angle) * 60,
                        player.y + Math.sin(angle) * 60,
                        '#ff8c42',
                        2.5
                    ));
                }
            }
        }
        
        let lastSpawn = 0;
        let eliteTimer = 0;
        let bossTimer = 0;
        
        function spawnEnemy() {
            const now = Date.now();
            
            // Boss生成逻辑 - 每60秒一个Boss，越来越强
            if (now - bossTimer > 60000 && !bossActive) {
                bossTimer = now;
                spawnBoss();
                return;
            }
            
            const interval = Math.max(300, 1000 - gameTime / 1500 - level * 50);
            
            if (now - lastSpawn > interval) {
                lastSpawn = now;
                
                let type = 'NORMAL';
                const rand = Math.random();
                const minutes = gameTime / 60000;
                
                if (minutes > 1 && rand < 0.3) type = 'FAST';
                if (minutes > 2 && rand < 0.25) type = 'TANK';
                if (minutes > 3 && rand < 0.15) type = 'ELITE';
                
                eliteTimer++;
                if (eliteTimer > 10 + Math.random() * 8) {
                    type = 'ELITE';
                    eliteTimer = 0;
                    showWarning('🔥 精英怪来袭！');
                }
                
                enemies.push(new Enemy(type));
                
                // 随着游戏进行增加敌人数量
                const extraCount = Math.min(5, Math.floor(minutes));
                for (let i = 0; i < extraCount && Math.random() < 0.5; i++) {
                    enemies.push(new Enemy('NORMAL', Math.random() < 0.3));
                }
            }
            
            difficultyMultiplier = 1 + gameTime / 40000;
            document.getElementById('diffLevel').textContent = difficultyMultiplier.toFixed(1);
        }
        
        function spawnBoss() {
            const minutes = gameTime / 60000;
            let bossType = 'DESTROYER';
            
            if (minutes > 4) bossType = 'OVERLORD';
            if (minutes > 8) bossType = 'APOCALYPSE';
            
            currentBoss = new Boss(bossType);
            bossActive = true;
            showWarning(`☠️ ${currentBoss.name} 降临！`);
        }
        
        function showWarning(text) {
            const warning = document.getElementById('eliteWarning');
            warning.textContent = text;
            warning.style.opacity = '1';
            warning.style.transform = 'translate(-50%, -50%) scale(1.4)';
            setTimeout(() => {
                warning.style.opacity = '0';
                warning.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 3000);
        }
        
        // 绘制函数
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) {
                ctx.globalAlpha = 0.4;
            }
            
            const glowRadius = player.radius + 20 + Math.sin(player.animFrame) * 5;
            const gradient = ctx.createRadialGradient(0, 0, player.radius, 0, 0, glowRadius);
            gradient.addColorStop(0, `rgba(255, 140, 66, ${player.glowIntensity})`);
            gradient.addColorStop(0.5, `rgba(255, 107, 53, ${player.glowIntensity * 0.5})`);
            gradient.addColorStop(1, 'rgba(255, 140, 66, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#d35400';
            ctx.beginPath();
            ctx.moveTo(-player.radius * 0.7, 8);
            for (let i = 0; i <= 12; i++) {
                const angle = (i / 12) * Math.PI + Math.PI;
                const wave = Math.sin(player.capeWave + i * 0.4) * 8;
                const r = player.radius * 1.3 + wave;
                ctx.lineTo(Math.cos(angle) * r * 0.7, Math.sin(angle) * r * 0.5 + 15);
            }
            ctx.closePath();
            ctx.fill();
            
            const bodyGrad = ctx.createRadialGradient(-8, -8, 0, 0, 0, player.radius);
            bodyGrad.addColorStop(0, '#ffa94d');
            bodyGrad.addColorStop(0.6, '#ff8c42');
            bodyGrad.addColorStop(1, '#e67e22');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#ffd93d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius - 6, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255, 140, 66, 0.4)';
            ctx.beginPath();
            ctx.moveTo(0, -player.radius * 0.6);
            ctx.lineTo(player.radius * 0.6, 0);
            ctx.lineTo(0, player.radius * 0.6);
            ctx.lineTo(-player.radius * 0.6, 0);
            ctx.closePath();
            ctx.fill();
            
            const eyeGlow = ctx.createRadialGradient(-7, -5, 0, -7, -5, 7);
            eyeGlow.addColorStop(0, '#ffffff');
            eyeGlow.addColorStop(0.5, '#ffd93d');
            eyeGlow.addColorStop(1, '#ff8c42');
            ctx.fillStyle = eyeGlow;
            ctx.beginPath();
            ctx.arc(-7, -5, 6, 0, Math.PI * 2);
            ctx.arc(7, -5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(-7, -5, 3, 0, Math.PI * 2);
            ctx.arc(7, -5, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-12, -12);
            ctx.lineTo(-2, -9);
            ctx.moveTo(2, -9);
            ctx.lineTo(12, -12);
            ctx.stroke();
            
            ctx.restore();
            
            // 绘制武器
            player.weapons.forEach(weapon => {
                const pos = weapon.getPosition();
                
                weapon.trail.forEach((t, i) => {
                    if (t.alpha > 0) {
                        ctx.save();
                        ctx.globalAlpha = t.alpha * 0.7;
                        ctx.fillStyle = `hsl(${25 + i * 2}, 100%, 60%)`;
                        ctx.translate(t.x, t.y);
                        ctx.rotate(t.angle + Math.PI/4);
                        ctx.fillRect(-weapon.size * 0.3, -weapon.size * 0.8, weapon.size * 0.6, weapon.size * 1.6);
                        ctx.restore();
                    }
                });
                
                weapon.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.life / 20;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                
                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(weapon.angle + weapon.rotation);
                
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff6b35';
                
                const bladeGrad = ctx.createLinearGradient(0, -weapon.size, 0, weapon.size);
                bladeGrad.addColorStop(0, '#fff5e6');
                bladeGrad.addColorStop(0.3, '#ffd93d');
                bladeGrad.addColorStop(0.7, '#ff8c42');
                bladeGrad.addColorStop(1, '#e74c3c');
                
                ctx.fillStyle = bladeGrad;
                ctx.beginPath();
                ctx.moveTo(0, -weapon.size);
                ctx.quadraticCurveTo(weapon.size * 0.5, 0, 0, weapon.size);
                ctx.quadraticCurveTo(-weapon.size * 0.5, 0, 0, -weapon.size);
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -weapon.size * 0.7);
                ctx.lineTo(0, weapon.size * 0.5);
                ctx.stroke();
                
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(-4, -10, 8, 20);
                
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
            
            const barW = 70, barH = 12, barY = player.y - 55;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(player.x - barW/2 - 2, barY - 2, barW + 4, barH + 4);
            
            const hpPct = player.health / player.maxHealth;
            const hpColor = hpPct > 0.6 ? '#00ff88' : hpPct > 0.3 ? '#ffd700' : '#ff0040';
            ctx.fillStyle = hpColor;
            ctx.fillRect(player.x - barW/2, barY, barW * hpPct, barH);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x - barW/2, barY, barW, barH);
        }
        
        function drawBackground() {
            const grad = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)
            );
            grad.addColorStop(0, '#2a1a1a');
            grad.addColorStop(0.5, '#1a1510');
            grad.addColorStop(1, '#0a0806');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = `rgba(255, 140, 66, ${0.08 + Math.sin(gameTime / 1200) * 0.04})`;
            ctx.lineWidth = 1;
            const gridSize = 70;
            const offset = (gameTime / 100) % gridSize;
            
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = offset; i < canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }
        
        function updateUI() {
            document.getElementById('health').textContent = Math.floor(player.health);
            document.getElementById('maxHealth').textContent = Math.floor(player.maxHealth);
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('kills').textContent = kills;
            document.getElementById('time').textContent = Math.floor(gameTime / 1000);
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            const dt = timestamp - lastTime;
            lastTime = timestamp;
            gameTime += dt;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            healItems = healItems.filter(h => h.life > 0);
            healItems.forEach(h => { h.update(); h.draw(); });
            
            expOrbs = expOrbs.filter(e => e.life > 0);
            expOrbs.forEach(e => { e.update(); e.draw(); });
            
            spawnEnemy();
            
            enemies.forEach(e => { e.update(); e.draw(); });
            
            if (currentBoss) {
                currentBoss.update();
                currentBoss.draw();
            }
            
            updatePlayer();
            drawPlayer();
            
            checkCollisions();
            
            damageTexts = damageTexts.filter(d => d.life > 0);
            damageTexts.forEach(d => { d.update(); d.draw(); });
            
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            
            const expW = Math.min(450, canvas.width - 40);
            const expX = (canvas.width - expW) / 2;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(expX, 10, expW, 32);
            
            const expGrad = ctx.createLinearGradient(expX, 0, expX + expW, 0);
            expGrad.addColorStop(0, '#ff6b35');
            expGrad.addColorStop(0.5, '#ff8c42');
            expGrad.addColorStop(1, '#ffa94d');
            ctx.fillStyle = expGrad;
            ctx.fillRect(expX, 10, expW * (exp / expToNext), 32);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2;
            ctx.strokeRect(expX, 10, expW, 32);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`LEVEL ${level}  ${exp}/${expToNext}`, canvas.width/2, 33);
            
            updateUI();
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            lastTime = performance.now();
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            initWeapons();
            requestAnimationFrame(gameLoop);
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('finalTime').textContent = Math.floor(gameTime / 1000);
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.health = 100;
            player.maxHealth = 100;
            player.speed = 3.5;
            player.maxSpeed = 6;
            player.vx = 0;
            player.vy = 0;
            player.invincible = 0;
            
            score = 0; kills = 0; level = 1; exp = 0; expToNext = 100;
            gameTime = 0; difficultyMultiplier = 1; eliteTimer = 0; bossTimer = 0;
            
            enemies = []; expOrbs = []; healItems = []; damageTexts = []; particles = [];
            currentBoss = null;
            bossActive = false;
            
            Input.reset();
            
            document.getElementById('boss-health').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            
            initWeapons();
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        // 按钮事件绑定 - 同时支持点击和触摸
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // 使用 pointer 事件统一处理鼠标和触摸
        startBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });
        
        restartBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            restartGame();
        });
        
        // 防止画布上的触摸事件影响按钮
        canvas.addEventListener('touchstart', (e) => {
            if (gameRunning) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>

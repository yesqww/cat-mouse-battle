<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红蓝小人剑弓对决</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameCanvas {
            border: 3px solid #fff;
            background: linear-gradient(to bottom, #16213e 0%, #0f3460 100%);
            margin-top: 20px;
        }
        
        #controls {
            margin-top: 10px;
            display: flex;
            gap: 50px;
            text-align: center;
        }
        
        .player-controls {
            padding: 10px;
            border-radius: 10px;
        }
        
        #red-controls {
            background: rgba(231, 76, 60, 0.3);
            border: 2px solid #e74c3c;
        }
        
        #blue-controls {
            background: rgba(52, 152, 219, 0.3);
            border: 2px solid #3498db;
        }
        
        h2 {
            margin: 5px 0;
        }
        
        .key {
            display: inline-block;
            padding: 3px 8px;
            background: #333;
            border-radius: 4px;
            margin: 2px;
            font-weight: bold;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 10;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 15px;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        button:hover {
            background: #c0392b;
        }
    </style>
<base target="_blank">
</head>
<body>
    <h1>⚔️ 红蓝对决 🏹</h1>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="controls">
        <div class="player-controls" id="red-controls">
            <h2>🔴 红色玩家</h2>
            <p>移动: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> (W跳跃)</p>
            <p>剑攻击: <span class="key">1</span> | 弓箭: <span class="key">2</span></p>
            <p>生命: <span id="red-hp">❤️❤️❤️</span></p>
        </div>
        <div class="player-controls" id="blue-controls">
            <h2>🔵 蓝色玩家</h2>
            <p>移动: <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> (↑跳跃)</p>
            <p>剑攻击: <span class="key">,</span> | 弓箭: <span class="key">.</span></p>
            <p>生命: <span id="blue-hp">❤️❤️❤️</span></p>
        </div>
    </div>
    
    <div id="gameOver">
        <h1 id="winner"></h1>
        <button onclick="resetGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = true;
        const gravity = 0.5;
        const groundY = 350;
        
        // 玩家对象
        const player1 = {
            x: 150,
            y: groundY - 40,
            width: 30,
            height: 40,
            color: '#e74c3c',
            vx: 0,
            vy: 0,
            speed: 5,
            jumpPower: -12,
            hp: 3,
            facing: 1, // 1右 -1左
            attacking: false,
            attackTimer: 0,
            attackType: '', // 'sword' 或 'bow'
            onGround: false,
            invincible: 0
        };
        
        const player2 = {
            x: 650,
            y: groundY - 40,
            width: 30,
            height: 40,
            color: '#3498db',
            vx: 0,
            vy: 0,
            speed: 5,
            jumpPower: -12,
            hp: 3,
            facing: -1,
            attacking: false,
            attackTimer: 0,
            attackType: '',
            onGround: false,
            invincible: 0
        };
        
        // 箭矢数组
        let arrows = [];
        
        // 按键状态
        const keys = {};
        
        // 监听键盘
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // 红色玩家攻击
            if (e.key === '1' && gameRunning) player1Attack('sword');
            if (e.key === '2' && gameRunning) player1Attack('bow');
            
            // 蓝色玩家攻击 (逗号和句号)
            if (e.key === ',' && gameRunning) player2Attack('sword');
            if (e.key === '.' && gameRunning) player2Attack('bow');
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // 红色玩家攻击
        function player1Attack(type) {
            if (player1.attacking) return;
            player1.attacking = true;
            player1.attackType = type;
            player1.attackTimer = type === 'sword' ? 20 : 10;
            
            if (type === 'bow') {
                arrows.push({
                    x: player1.x + (player1.facing === 1 ? 30 : 0),
                    y: player1.y + 15,
                    vx: player1.facing * 10,
                    vy: 0,
                    owner: 1,
                    color: '#e74c3c'
                });
            }
        }
        
        // 蓝色玩家攻击
        function player2Attack(type) {
            if (player2.attacking) return;
            player2.attacking = true;
            player2.attackType = type;
            player2.attackTimer = type === 'sword' ? 20 : 10;
            
            if (type === 'bow') {
                arrows.push({
                    x: player2.x + (player2.facing === 1 ? 30 : 0),
                    y: player2.y + 15,
                    vx: player2.facing * 10,
                    vy: 0,
                    owner: 2,
                    color: '#3498db'
                });
            }
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning) return;
            
            // 红色玩家移动 (WASD)
            if (keys['a'] || keys['A']) {
                player1.vx = -player1.speed;
                player1.facing = -1;
            } else if (keys['d'] || keys['D']) {
                player1.vx = player1.speed;
                player1.facing = 1;
            } else {
                player1.vx *= 0.8;
            }
            
            if ((keys['w'] || keys['W']) && player1.onGround) {
                player1.vy = player1.jumpPower;
                player1.onGround = false;
            }
            
            // 蓝色玩家移动 (方向键)
            if (keys['ArrowLeft']) {
                player2.vx = -player2.speed;
                player2.facing = -1;
            } else if (keys['ArrowRight']) {
                player2.vx = player2.speed;
                player2.facing = 1;
            } else {
                player2.vx *= 0.8;
            }
            
            if (keys['ArrowUp'] && player2.onGround) {
                player2.vy = player2.jumpPower;
                player2.onGround = false;
            }
            
            // 物理更新
            [player1, player2].forEach(p => {
                p.vy += gravity;
                p.x += p.vx;
                p.y += p.vy;
                
                // 地面碰撞
                if (p.y + p.height > groundY) {
                    p.y = groundY - p.height;
                    p.vy = 0;
                    p.onGround = true;
                }
                
                // 边界限制
                p.x = Math.max(0, Math.min(canvas.width - p.width, p.x));
                
                // 无敌时间递减
                if (p.invincible > 0) p.invincible--;
                
                // 攻击计时器
                if (p.attackTimer > 0) {
                    p.attackTimer--;
                    if (p.attackTimer === 0) p.attacking = false;
                }
            });
            
            // 剑攻击检测
            checkSwordHit(player1, player2);
            checkSwordHit(player2, player1);
            
            // 箭矢更新
            for (let i = arrows.length - 1; i >= 0; i--) {
                let arrow = arrows[i];
                arrow.x += arrow.vx;
                arrow.y += arrow.vy;
                
                // 检测击中玩家
                let target = arrow.owner === 1 ? player2 : player1;
                if (arrow.x > target.x && arrow.x < target.x + target.width &&
                    arrow.y > target.y && arrow.y < target.y + target.height) {
                    if (target.invincible === 0) {
                        target.hp--;
                        target.invincible = 60;
                        updateHP();
                        checkWin();
                    }
                    arrows.splice(i, 1);
                    continue;
                }
                
                // 移除超出边界的箭
                if (arrow.x < 0 || arrow.x > canvas.width) {
                    arrows.splice(i, 1);
                }
            }
        }
        
        // 剑攻击检测
        function checkSwordHit(attacker, target) {
            if (!attacker.attacking || attacker.attackType !== 'sword') return;
            if (attacker.attackTimer !== 15) return; // 只在攻击中段检测
            
            let attackRange = 50;
            let attackX = attacker.facing === 1 ? attacker.x + attacker.width : attacker.x - attackRange;
            let attackY = attacker.y;
            
            // 检测碰撞
            if (attackX < target.x + target.width && attackX + attackRange > target.x &&
                attackY < target.y + target.height && attackY + 30 > target.y) {
                if (target.invincible === 0) {
                    target.hp--;
                    target.invincible = 60;
                    // 击退效果
                    target.vx = attacker.facing * 8;
                    target.vy = -5;
                    updateHP();
                    checkWin();
                }
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地面
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, groundY, canvas.width, 5);
            
            // 绘制玩家
            drawPlayer(player1);
            drawPlayer(player2);
            
            // 绘制箭矢
            arrows.forEach(arrow => {
                ctx.fillStyle = arrow.color;
                ctx.beginPath();
                ctx.moveTo(arrow.x, arrow.y);
                ctx.lineTo(arrow.x - arrow.vx * 2, arrow.y - 3);
                ctx.lineTo(arrow.x - arrow.vx * 2, arrow.y + 3);
                ctx.fill();
            });
        }
        
        // 绘制玩家
        function drawPlayer(p) {
            ctx.save();
            
            // 无敌闪烁效果
            if (p.invincible > 0 && Math.floor(p.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            // 身体
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.width, p.height);
            
            // 眼睛
            ctx.fillStyle = 'white';
            let eyeX = p.facing === 1 ? p.x + 20 : p.x + 5;
            ctx.fillRect(eyeX, p.y + 8, 5, 5);
            ctx.fillStyle = 'black';
            ctx.fillRect(eyeX + (p.facing === 1 ? 2 : 0), p.y + 9, 3, 3);
            
            // 左手剑
            ctx.fillStyle = '#95a5a6';
            if (p.attacking && p.attackType === 'sword') {
                // 攻击动画
                ctx.save();
                ctx.translate(p.x + p.width/2, p.y + 20);
                ctx.rotate(p.facing === 1 ? -Math.PI/4 : Math.PI/4);
                ctx.fillRect(0, -5, 40, 10);
                // 剑刃
                ctx.fillStyle = '#bdc3c7';
                ctx.fillRect(5, -3, 30, 6);
                ctx.restore();
            } else {
                // 持剑姿势
                ctx.fillRect(p.x + (p.facing === 1 ? -5 : 25), p.y + 15, 10, 25);
            }
            
            // 右手弓
            ctx.fillStyle = '#8b4513';
            if (p.attacking && p.attackType === 'bow') {
                // 拉弓姿势
                ctx.beginPath();
                ctx.arc(p.x + (p.facing === 1 ? 35 : -5), p.y + 20, 15, -Math.PI/2, Math.PI/2);
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 3;
                ctx.stroke();
                // 弓弦
                ctx.beginPath();
                ctx.moveTo(p.x + (p.facing === 1 ? 35 : -5), p.y + 5);
                ctx.lineTo(p.x + (p.facing === 1 ? 20 : 10), p.y + 20);
                ctx.lineTo(p.x + (p.facing === 1 ? 35 : -5), p.y + 35);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else {
                // 背弓
                ctx.fillRect(p.x + (p.facing === 1 ? 25 : -5), p.y + 5, 5, 20);
            }
            
            // 生命指示器
            ctx.fillStyle = 'white';
            ctx.font = '12px Arial';
            ctx.fillText('HP:' + p.hp, p.x, p.y - 5);
            
            ctx.restore();
        }
        
        // 更新生命显示
        function updateHP() {
            document.getElementById('red-hp').textContent = '❤️'.repeat(player1.hp) + '🖤'.repeat(3-player1.hp);
            document.getElementById('blue-hp').textContent = '❤️'.repeat(player2.hp) + '🖤'.repeat(3-player2.hp);
        }
        
        // 检查胜利
        function checkWin() {
            if (player1.hp <= 0) {
                endGame('🔵 蓝色玩家获胜！');
            } else if (player2.hp <= 0) {
                endGame('🔴 红色玩家获胜！');
            }
        }
        
        // 游戏结束
        function endGame(winnerText) {
            gameRunning = false;
            document.getElementById('winner').textContent = winnerText;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        // 重置游戏
        function resetGame() {
            player1.x = 150;
            player1.y = groundY - 40;
            player1.hp = 3;
            player1.vx = 0;
            player1.vy = 0;
            player1.facing = 1;
            
            player2.x = 650;
            player2.y = groundY - 40;
            player2.hp = 3;
            player2.vx = 0;
            player2.vy = 0;
            player2.facing = -1;
            
            arrows = [];
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            updateHP();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
